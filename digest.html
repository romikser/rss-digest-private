<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSS Digest</title>
<style>
  :root {
    --bg: #0f0f0f;
    --bg-card: #1a1a1a;
    --bg-group: #141414;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --text-muted: #888;
    --text-link: #5b9cf6;
    --text-link-hover: #7eb3ff;
    --accent: #3d7eff;
    --group-border: #2d4a8a;
    --btn-bg: #1e293b;
    --btn-hover: #273349;
    --summary-bg: #111827;
    --radius: 10px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f4f4;
      --bg-card: #fff;
      --bg-group: #f8f9ff;
      --border: #e0e0e0;
      --text: #111;
      --text-muted: #666;
      --text-link: #1a56db;
      --text-link-hover: #1045b5;
      --accent: #1a56db;
      --group-border: #93b4f0;
      --btn-bg: #e8f0fe;
      --btn-hover: #d0e2fd;
      --summary-bg: #f0f4ff;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }
  header {
    position: sticky;
    top: 0;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 100;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    flex: 1;
  }
  .header-meta {
    font-size: 13px;
    color: var(--text-muted);
  }
  .btn-top {
    background: var(--btn-bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 13px;
    cursor: pointer;
  }
  .btn-top:hover { background: var(--btn-hover); }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 16px;
  }
  .scroll-anchor { display: flex; flex-direction: column-reverse; }
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }
  .empty-state h2 { font-size: 20px; margin-bottom: 8px; }
  .empty-state p { font-size: 15px; }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin: 10px 0;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: var(--accent); }
  .card-img { max-height: 220px; overflow: hidden; }
  .card-img img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    display: block;
  }
  .card-body { padding: 14px 16px; }
  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
    flex-wrap: wrap;
  }
  .meta-feed { font-weight: 500; color: var(--text-muted); }
  .meta-date { margin-left: auto; }
  .card-title { font-size: 17px; font-weight: 600; line-height: 1.4; margin-bottom: 8px; }
  .card-title a {
    color: var(--text);
    text-decoration: none;
  }
  .card-title a:hover { color: var(--text-link); }
  .card-desc {
    font-size: 14px;
    line-height: 1.5;
    color: var(--text-muted);
    margin-bottom: 10px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .btn-summarize {
    background: var(--btn-bg);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-summarize:hover { background: var(--btn-hover); color: var(--text); }
  .btn-summarize:disabled { opacity: 0.5; cursor: default; }
  .summary-text {
    margin-top: 10px;
    padding: 10px 12px;
    background: var(--summary-bg);
    border-radius: 6px;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
  }
  .story-group {
    border: 1px solid var(--group-border);
    border-radius: var(--radius);
    margin: 14px 0;
    overflow: hidden;
    background: var(--bg-group);
  }
  .group-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    padding: 8px 14px;
    border-bottom: 1px solid var(--group-border);
    background: rgba(93, 156, 246, 0.05);
  }
  .story-group .card {
    border-left: none;
    border-right: none;
    border-top: none;
    border-radius: 0;
    margin: 0;
    border-bottom-color: var(--border);
  }
  .story-group .card:last-child { border-bottom: none; }
  .jump-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    transition: transform 0.15s;
  }
  .jump-btn:hover { transform: scale(1.1); }
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 300;
    align-items: center;
    justify-content: center;
  }
  .loading-overlay.active { display: flex; }
  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <h1>📰 RSS Digest</h1>
  <span class="header-meta">0 articles · Updated Jun 22, 12:03 PM</span>
  <button class="btn-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ Newest</button>
</header>
<main>
<div class="empty-state">
      <h2>No articles yet</h2>
      <p>Ask the agent to run <code>rss_digest_run</code> or <code>rss_feed_add</code> to get started.</p>
    </div>
</main>
<button class="jump-btn" id="jumpBtn" onclick="jumpToggle()" title="Jump to oldest/newest">↓</button>
<script>
const SUMMARIZE_PATH = "";
let atBottom = true;

function jumpToggle() {
  if (atBottom) {
    window.scrollTo({ top: 0, behavior: 'smooth' });
    atBottom = false;
    document.getElementById('jumpBtn').textContent = '↓';
  } else {
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    atBottom = true;
    document.getElementById('jumpBtn').textContent = '↑';
  }
}

async function summarize(id, btn) {
  const area = document.getElementById('summary-' + id);
  if (!area) return;
  const textEl = area.querySelector('.summary-text');
  if (!textEl) return;
  btn.disabled = true;
  btn.textContent = '⏳ Summarizing…';
  try {
    const resp = await fetch(SUMMARIZE_PATH + '?id=' + encodeURIComponent(id));
    const data = await resp.json();
    textEl.textContent = data.summary ?? data.error ?? 'No summary available.';
    textEl.style.display = 'block';
    btn.style.display = 'none';
  } catch (e) {
    textEl.textContent = 'Failed to generate summary. Try again later.';
    textEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '✨ Summarize';
  }
}

// Start at bottom (oldest articles)
window.addEventListener('load', () => {
  window.scrollTo(0, document.body.scrollHeight);
  atBottom = true;
  document.getElementById('jumpBtn').textContent = '↑';
});
</script>
</body>
</html>
