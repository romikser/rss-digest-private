<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSS Reader</title>
<style>
:root{--bg:#0f0f0f;--bg2:#141414;--bg3:#1a1a1a;--bg4:#222;--border:rgba(255,255,255,0.08);--text:#e2e2e2;--text2:#999;--text3:#666;--accent:#378ADD;--accent-bg:rgba(55,138,221,0.12);--star:#BA7517;--radius:8px;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;--font-serif:Georgia,"Times New Roman",serif}
@media(prefers-color-scheme:light){:root{--bg:#f2f1f0;--bg2:#e8e7e5;--bg3:#fff;--bg4:#f8f7f6;--border:rgba(0,0,0,0.09);--text:#111;--text2:#555;--text3:#999;--accent:#185FA5;--accent-bg:rgba(24,95,165,0.1);--star:#854F0B}}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column}
#app{display:flex;flex:1;overflow:hidden}
#sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#sidebar-scroll{flex:1;overflow-y:auto;padding:8px 0 16px}
#list-pane{width:300px;flex-shrink:0;border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#reader-pane{flex:1;display:flex;flex-direction:column;overflow:hidden}
.sidebar-section{padding:16px 12px 4px;font-size:10.5px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--text3)}
.nav-item{display:flex;align-items:center;gap:8px;padding:6px 10px;margin:1px 6px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);user-select:none}
.nav-item:hover{background:var(--border);color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent)}
.nav-badge{margin-left:auto;font-size:10.5px;font-weight:500;background:var(--bg4);color:var(--text3);border-radius:9px;padding:1px 6px;min-width:20px;text-align:center}
.nav-item.active .nav-badge{background:var(--accent-bg);color:var(--accent)}
.feed-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sidebar-divider{height:0.5px;background:var(--border);margin:8px 14px}
#list-toolbar{padding:9px 12px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
#list-title{font-size:13.5px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill-row{display:flex;gap:3px}
.pill{padding:3px 9px;border-radius:99px;font-size:11px;cursor:pointer;background:var(--bg4);color:var(--text2);border:0.5px solid var(--border);user-select:none}
.pill.active{background:var(--accent-bg);color:var(--accent);border-color:transparent}
#list-scroll{flex:1;overflow-y:auto;min-height:0}
#list-empty{padding:48px 20px;text-align:center;font-size:13px;color:var(--text3);display:none}
.article-row{padding:11px 12px;border-bottom:0.5px solid var(--border);cursor:pointer;user-select:none}
.article-row:hover{background:var(--bg4)}
.article-row.selected{background:var(--accent-bg)}
.row-top{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.unread-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;transition:opacity .15s}
.article-row.read .unread-dot{opacity:0}
.row-feed{font-size:11px;color:var(--text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.article-row.selected .row-feed,.article-row.selected .row-date{color:var(--accent);opacity:.7}
.row-date{font-size:11px;color:var(--text3);flex-shrink:0}
.row-title{font-size:13px;font-weight:500;line-height:1.38;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.article-row.selected .row-title{color:var(--accent)}
.row-desc{font-size:11.5px;color:var(--text2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.article-row.selected .row-desc{color:var(--accent);opacity:.7}
.cluster-badge{font-size:10px;background:rgba(186,117,23,.15);color:var(--star);border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:500}
#list-keyhints{padding:7px 12px;border-top:0.5px solid var(--border);display:flex;gap:12px;flex-wrap:wrap;flex-shrink:0}
.hint{font-size:10.5px;color:var(--text3)}
.hint kbd{display:inline-block;background:var(--bg4);border:0.5px solid var(--border);border-radius:3px;padding:0 4px;font-family:monospace;font-size:10px;color:var(--text2);margin:0 1px}
#above-count{font-size:11px;font-weight:600;color:var(--accent);cursor:pointer;flex-shrink:0;min-width:28px;display:none}
#above-count.visible{display:block}
#reader-toolbar{padding:9px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.icon-btn{background:none;border:0.5px solid transparent;border-radius:6px;cursor:pointer;color:var(--text2);padding:4px 6px;font-size:15px;display:flex;align-items:center;gap:4px}
.icon-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--border)}
.icon-btn.on{color:var(--star)}
#reader-toolbar-right{display:flex;gap:4px;margin-left:auto}
#reader-scroll{flex:1;overflow-y:auto;min-height:0}
#reader-inner{max-width:660px;padding:24px 28px 60px;margin:0 auto}
#reader-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:13px;flex-direction:column;gap:8px}
.reader-meta{font-size:11.5px;color:var(--text3);margin-bottom:8px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.reader-feed-badge{background:var(--accent-bg);color:var(--accent);font-size:11px;padding:2px 7px;border-radius:4px;font-weight:500}
#reader-title{font-size:22px;font-weight:600;line-height:1.3;margin-bottom:16px}
.reader-summary-block{font-size:13px;background:var(--bg2);border-left:2px solid var(--accent);border-radius:0 6px 6px 0;padding:10px 14px;color:var(--text2);margin-bottom:18px;line-height:1.6}
.reader-summary-label{font-size:10px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
#reader-hero{width:100%;max-height:260px;object-fit:cover;border-radius:var(--radius);margin-bottom:18px;display:block}
#reader-body{font-family:var(--font-serif);font-size:16px;line-height:1.75;color:var(--text2)}
#reader-body p{margin-bottom:1em}
#reader-open-link{margin-top:20px;display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--accent);text-decoration:none;border:0.5px solid var(--border);border-radius:6px;padding:7px 12px}
.generated-badge{font-size:11px;color:var(--text3);padding:4px 8px;background:var(--bg4);border-radius:4px;white-space:nowrap}
@keyframes spin{to{transform:rotate(360deg)}}
#search-row{padding:5px 12px;border-bottom:0.5px solid var(--border);flex-shrink:0}
#search-input{width:100%;background:var(--bg4);border:0.5px solid var(--border);border-radius:6px;padding:5px 10px;font-size:12.5px;color:var(--text);outline:none;font-family:var(--font)}
#search-input::placeholder{color:var(--text3)}
#search-input:focus{border-color:var(--accent);background:var(--bg3)}
@media(max-width:900px){#sidebar{display:none}#list-pane{width:280px}}
@media(max-width:600px){#list-pane{width:100%;display:flex}#reader-pane{display:none}#list-pane.hidden{display:none}#reader-pane.visible{display:flex;width:100%}#back-btn{display:flex !important}}
#back-btn{display:none}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-scroll">
      <div class="sidebar-section">Smart views</div>
      <div class="nav-item active" data-view="all" data-label="All articles" onclick="selectView(this)"><span>⊞</span> All articles <span class="nav-badge" id="badge-all">—</span></div>
      <div class="nav-item" data-view="unread" data-label="Unread" onclick="selectView(this)"><span>●</span> Unread <span class="nav-badge" id="badge-unread">—</span></div>
      <div class="nav-item" data-view="starred" data-label="Starred" onclick="selectView(this)"><span>★</span> Starred <span class="nav-badge" id="badge-starred">—</span></div>
      <div class="nav-item" data-view="today" data-label="Today" onclick="selectView(this)"><span>◷</span> Today <span class="nav-badge" id="badge-today">—</span></div>
      <div class="sidebar-divider"></div>
      <div id="feed-list"></div>
    </div>
  </div>
  <div id="list-pane">
    <div id="list-toolbar">
      <span id="above-count" onclick="scrollListTop()" title="Scroll to top"></span>
      <span id="list-title">All articles</span>
      <div class="pill-row">
        <div class="pill active" data-filter="all" onclick="setFilter(this)">All</div>
        <div class="pill" data-filter="unread" onclick="setFilter(this)">Unread</div>
        <div class="pill" data-filter="starred" onclick="setFilter(this)">Starred</div>
      </div>
    </div>
    <div id="search-row"><input id="search-input" type="search" placeholder="Search articles…" oninput="onSearch(event)"></div>
    <div id="list-scroll"><div id="list-empty">No articles</div></div>
    <div id="list-keyhints">
      <span class="hint"><kbd>j</kbd><kbd>k</kbd> navigate</span>
      <span class="hint"><kbd>u</kbd> unread</span>
      <span class="hint"><kbd>s</kbd> star</span>
      <span class="hint"><kbd>o</kbd> open</span>
      <span class="hint"><kbd>/</kbd> search</span>
    </div>
  </div>
  <div id="reader-pane">
    <div id="reader-toolbar">
      <button class="icon-btn" id="back-btn" onclick="showList()" title="Back to list">←</button>
      <button class="icon-btn" onclick="nav(-1)">↑</button>
      <button class="icon-btn" onclick="nav(1)">↓</button>
      <div id="reader-toolbar-right">
        <button class="icon-btn" id="btn-star" onclick="toggleStar()">☆</button>
        <button class="icon-btn" id="btn-unread" onclick="toggleUnread()">◎</button>
        <button class="icon-btn" onclick="markAllRead()">✓ All read</button>
        <a class="icon-btn" href="http://127.0.0.1:18789/plugins/rss-digest/refresh" target="_blank" rel="noopener" title="Fetch new articles">↻</a>
      </div>
    </div>
    <div id="reader-scroll">
      <div id="reader-empty">
        <span>Select an article</span>
        <span class="generated-badge" id="gen-badge"></span>
      </div>
      <div id="reader-inner" style="display:none"></div>
    </div>
  </div>
</div>

.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"Spark Tungsten & Whole-Stage Codegen: Memory Layout, Codegen Stages, Off-Heap","url":"https://dev.to/gowthampotureddi/spark-tungsten-whole-stage-codegen-memory-layout-codegen-stages-off-heap-55dk","publishedAt":1782483227000,"description":"<p><strong><code>spark tungsten</code></strong> is the single most leverage-dense optimization layer inside Apache Spark — and the one most senior data engineers can describe at the marketing level (\"CPU-efficient execution\") but stumble on the moment an interviewer asks what an UnsafeRow actually looks like in memory or which operators break <code>whole stage codegen</code>. Tungsten is not one feature; it is three braided ones — a binary memory layout (UnsafeRow + page-based allocator), a runt","author":"Gowtham Potureddi","clusterSize":16},{"id":"c72bd9585b83880f","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"Spark Connect: Decoupled Client-Server Architecture, gRPC & Multi-Language Sessions","url":"https://dev.to/gowthampotureddi/spark-connect-decoupled-client-server-architecture-grpc-multi-language-sessions-4e70","publishedAt":1782482977000,"description":"<p><strong><code>spark connect</code></strong> is the single biggest architectural change in Apache Spark since DataFrames replaced RDDs — and it quietly rewires every assumption senior data engineers carry from years of <code>spark-submit</code>, fat driver JARs, and JVM-coupled clients. The classic Spark deployment is a monolith: the driver, the SparkContext, the user code, the catalyst optimiser, and the executor scheduler all run together in one JVM, and every client language (PySpark, spark","author":"Gowtham Potureddi","clusterSize":16},{"id":"19c2d9c0e59dd961","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"Spark Catalyst Optimizer & Adaptive Query Execution (AQE): Plan Internals for 2026","url":"https://dev.to/gowthampotureddi/spark-cata el","url":"https://www.infoworld.com/article/4190089/us-tells-openai-to-restrict-access-to-its-most-powerful-ai-model-2.html","publishedAt":1782490193000,"description":"US authorities are getting decidedly twitchy about frontier AI models. Just a couple of weeks after ordering Anthropic to prevent foreign companies from getting hold of its latest release, Mythos/Fable 5, it’s been putting the squeeze on another AI company.. Now, the Trump administration is asking OpenAI to hold back on the general release of GPT-5.6, according to a report from Bloomberg . OpenAI CEO Sam Altman reportedly told employees that the government is asking that the model be released on","imageUrl":"https://www.infoworld.com/wp-content/uploads/2026/06/4190089-0-75494700-1782490209-shutterstock_2253221991.jpg?quality=50&#038;strip=all","clusterSize":8},{"id":"19171aef4678fc47","feedUrl":"http://feeds2.feedburner.com/thenextweb","feedTitle":"The Next Web","title":"The US government asks OpenAI to slow its next model’s release","url":"https://thenextweb.com/news/trump-administration-openai-stagger-model-release","publishedAt":1782467284000,"description":"Sam Altman told staff Washington wants GPT-5.6 released first to a short list of trusted partners, with access approved customer by customer. For years the debate over slowing down powerful AI models was a matter for company safety teams and outside critics. Now it has a government request attached. The Trump administration has asked OpenAI […] This story continues at The Next Web","imageUrl":"https://media.thenextweb.com/2026/06/gary-marcus-openai-ipo-ai-stocks-risk.avif","author":"Alina Maria Stan","clusterSize":8},{"id":"b8a59ecaa6bc07ac","feedUrl":"http://feeds2.feedburner.com/thenextweb","feedTitle":"The Next Web","title":"Cargo drone startup Elroy Air nears an $800m SPAC deal","url":"https://thenextweb.com/news/elroy-air-800m-spac-deal","publishedAt":1782466492000,"description":"The maker of the autonomous Chaparral is in advanced talks to go public through a blank-cheque merger valuing the combined company at about $1bn. The SPAC, declared dead more than once over the past few years, keeps finding new uses, and the latest is a cargo drone. Elroy Air, a California startup that wants to […] This story continues at The Next Web","imageUrl":"https://media.thenextweb.com/2026/06/Elroy-Air.avif","author":"Alina Maria Stan","clusterSize":1},{"id":"75e8be0a6324d8f3","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"SQL window functions: what separates a mid-level from a senior developer","url":"https://dev.to/lbraun7/sql-window-functions-what-separates-a-mid-level-from-a-senior-developer-2mf3","publishedAt":1782484153000,"description":"<p><em>Most developers know SELECT, JOIN, and GROUP BY. Window functions are where the gap between mid and senior starts to show.</em></p> <h2> What makes window functions different </h2> <p><code>GROUP BY</code> collapses rows. You lose the individual record — it becomes part of an aggregate.</p> <p>Window functions don't collapse anything. They compute an aggregate <strong>over a set of rows</strong> while keeping every row intact. That's the core idea.<br> </p> <div class=\"highlight js-code-h","author":"Lucas Braun","clusterSize":1},{"id":"b098654584713486","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"PostgreSQL 2D000 Error: Causes and Solutions Complete Guide","url":"https://dev.to/dbmserror/postgresql-2d000-error-causes-and-solutions-complete-guide-1n9k","publishedAt":1782540180000,"description":"<h2> PostgreSQL Error 2D000: Invalid Transaction Termination </h2> <p>The <code>2D000 invalid transaction termination</code> error occurs when PostgreSQL encounters a <code>COMMIT</code> or <code>ROLLBACK</code> statement in a context where transaction control is not permitted. The most common scenario is attempting to call these commands inside a regular PL/pgSQL function or a trigger function. PostgreSQL enforces strict rules about where transactions can be terminated to preserve data integrit","author":"umzzil nng","clusterSize":9},{"id":"cfab10642c61f2c9","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"Oracle ORA-01008 Error: Causes and Solutions Complete Guide","url":"https://dev.to/dbmserror/oracle-ora-01008-error-causes-and-solutions-complete-guide-4o8j","publishedAt":1782540098000,"description":"<h2> ORA-01008: Not All Variables Bound — Causes, Fixes, and Prevention </h2> <p>ORA-01008 is thrown by Oracle when the number of bind variables declared in a SQL statement does not match the number of variables actually bound before execution. Simply put, you've used placeholders like <code>:1</code>, <code>:2</code>, or <code>:name</code> in your SQL, but failed to supply a value for each one. This error commonly appears in PL/SQL dynamic SQL, JDBC applications, Python (cx_Oracle/oracledb), an","author":"umzzil nng","clusterSize":9},{"id":"df5394793f99c615","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"PostgreSQL 2BP01 Error: Causes and Solutions Complete Guide","url":"https://dev.to/dbmserror/postgresql-2bp01-error-causes-and-solutions-complete-guide-1k3h","publishedAt":1782518583000,"description":"<h2> PostgreSQL Error 2BP01: dependent objects still exist </h2> <p>PostgreSQL error <strong>2BP01 (dependent_objects_still_exist)</strong> occurs when you attempt to drop a database object — such as a table, schema, function, or type — that other objects still depend on. This is PostgreSQL's built-in safety mechanism to prevent you from accidentally breaking views, foreign keys, triggers, or other structures that rely on the object you're trying to remove. Understanding and handling this error ","author":"umzzil nng","clusterSize":9},{"id":"1f847f7ce33df4c5","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"Oracle ORA-01007 Error: Causes and Solutions Complete Guide","url" a role, user, or other database object that still has associated privilege descriptors tied to it. Essentially, PostgreSQL is protecting you from leaving orphaned permission references in the system catalog. You must remove or reassign all dependent privileges before the drop operation will succeed.</p> <h2> Top 3 Causes </h2> <h3> 1. Granted Privi","author":"umzzil nng","clusterSize":9},{"id":"eb3e06fc803a5c99","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"Oracle ORA-01006 Error: Causes and Solutions Complete Guide","url":"https://dev.to/dbmserror/oracle-ora-01006-error-causes-and-solutions-complete-guide-3maa","publishedAt":1782482509000,"description":"<h2> ORA-01006: Bind Variable Does Not Exist — Causes, Fixes & Prevention </h2> <p>ORA-01006 is a runtime Oracle error thrown when a bind variable referenced in a SQL statement cannot be found or has not been properly registered in the execution context. This error typically surfaces in dynamic SQL environments, application-tier database drivers (JDBC, OCI, cx_Oracle), and PL/SQL blocks that use <code>EXECUTE IMMEDIATE</code> or <code>DBMS_SQL</code>. Because it occurs at runtime rather than par","author":"umzzil nng","clusterSize":9},{"id":"b6c21765bc57b1ac","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"PostgreSQL 28P01 Error: Causes and Solutions Complete Guide","url":"https://dev.to/dbmserror/postgresql-28p01-error-causes-and-solutions-complete-guide-ie1","publishedAt":1782468190000,"description":"<h2> PostgreSQL Error 28P01: Invalid Password — Causes, Fixes & Prevention </h2> <p>PostgreSQL error code <code>28P01</code> is thrown during the authentication phase when the password provided by a client does not match the one stored for the given database role. For security reasons, PostgreSQL intentionally returns the same error whether the user doesn't exist or the password is simply wrong — making diagnosis require a closer look at server logs. This error can surface in any client tool or ","author":"umzzil nng","clusterSize":9},{"id":"69644b970ea69363","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"Oracle ORA-01005 Error: Causes and Solutions Complete Guide","url":"https://dev.to/dbmserror/oracle-ora-01005-error-causes-and-solutions-complete-guide-4nd9","publishedAt":1782468095000,"description":"<h2> ORA-01005: null password given; logon denied — A Practical Guide </h2> <p>ORA-01005 occurs when Oracle receives a NULL or empty password during a login attempt, causing the connection to be rejected immediately. This error is not always caused by a user simply forgetting to type a password — it frequently originates from misconfigured application connection strings, uninitialized variables in code, or broken authentication setups. Understanding the root cause quickly is key to restoring ser","author":"umzzil nng","clusterSize":9},{"id":"712933fac365972f","feedUrl":"https://districtmagazine.ie/feed/","feedTitle":"District Magazine","title":"This Literary Salon Is Celebrating Queer Joy Through Gaeilge","url":"https://districtmagazine.ie/features/this-literary-salon-is-celebrating-queer-joy-through-gaeilge/","publishedAt":1782466482000,"description":"The recent Irish language revival has brought new life to the Gaeilge once taught to us in school. What once was a just required subject for many young people, made difficult to access as a result of an outdated curriculum, is now being rapped, spoken by the country’s biggest stars and incorporated into our streetwear […]","author":"District","clusterSize":1},{"id":"1e5646ddda16b745","feedUrl":"http://www.macrumors.com/macrumors.xml","feedTitle":"MacRumors: Mac News and Rumors - Front Page","title":"Apple's OLED 'MacBook Ultra' Will Stick With M5 Pro and M5 Max Chips","url":"https://www.macrumors.com/2026/06/26/oled-macbook-stick-with-m5-pro-and-m5-max/","publishedAt":1782488112000,"description":"Apple's upcoming high-end MacBook const LS_READ = 'rss:read:';
const LS_STAR = 'rss:star:';
const COLORS = ['#378ADD','#1D9E75','#D85A30','#7F77DD','#D4537E','#BA7517','#639922','#888780','#E24B4A'];
const feedColors = {};
let colorIdx = 0;
function feedColor(url) {
  if (!feedColors[url]) feedColors[url] = COLORS[colorIdx++ % COLORS.length];
  return feedColors[url];
}

let state = { view:'all', filter:'all', feedUrl:null, selected:null, visible:[], search:'' };
let _ignoreScroll = false;
let _scrollTimer = null;

function isRead(id) { return !!localStorage.getItem(LS_READ+id); }
function isStarred(id) { return !!localStorage.getItem(LS_STAR+id); }
function setRead(id, v) { v ? localStorage.setItem(LS_READ+id,'1') : localStorage.removeItem(LS_READ+id); }
function setStar(id, v) { v ? localStorage.setItem(LS_STAR+id,'1') : localStorage.removeItem(LS_STAR+id); }

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function relTime(ms) {
  if (!ms) return '';
  const d = Math.floor((Date.now()-ms)/1000);
  if (d<60) return 'just now';
  if (d<3600) return Math.floor(d/60)+'m ago';
  if (d<86400) return Math.floor(d/3600)+'h ago';
  return Math.floor(d/86400)+'d ago';
}

function getTopmostArticleId() {
  const sc = document.getElementById('list-scroll');
  if (!sc) return null;
  const top = sc.getBoundingClientRect().top;
  for (const r of sc.querySelectorAll('.article-row'))
    if (r.getBoundingClientRect().bottom > top + 10) return r.dataset.id;
  return null;
}
function saveScrollAnchor(id) {

}
function markScrolledPastRead() {
  if (_ignoreScroll) return;
  const sc = document.getElementById('list-scroll');
  if (!sc) return;
  const top = sc.getBoundingClientRect().top;
  let changed = false;
  for (const row of sc.querySelectorAll('.article-row')) {
    if (row.getBoundingClientRect().bottom >= top) break;
    const id = row.dataset.id;
    if (!isRead(id)) { setRead(id, true); row.classList.add('read'); changed = true; }
  }
  if (changed) renderSidebar();
  saveScrollAnchor();
}

  if (!id) return;
  const row = document.querySelector('.article-row[data-id="' + id + '"]');
  if (!row) return;

function boot() {
  const d = new Date(generatedAt);
  document.getElementById('gen-badge').textContent =
    'Updated ' + d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  document.getElementById('list-scroll').addEventListener('scroll', onListScroll, { passive: true });
  renderSidebar();
  applyView();
}

function renderSidebar() {
  const now = Date.now(), todayCutoff = now - 86400000;
  let totalUnread=0, totalStarred=0, todayCount=0;
  for (const a of ALL_ARTICLES) {
    if (!isRead(a.id)) totalUnread++;
    if (isStarred(a.id)) totalStarred++;
    if ((a.publishedAt||0) >= todayCutoff) todayCount++;
  }
  document.getElementById('badge-all').textContent = ALL_ARTICLES.length;
  document.getElementById('badge-unread').textContent = totalUnread;
  document.getElementById('badge-starred').textContent = totalStarred;
  document.getElementById('badge-today').textContent = todayCount;

  const cats = {};
  for (const f of ALL_FEEDS) {
    const cat = f.category||'';
    if (!cats[cat]) cats[cat]=[];
    cats[cat].push(f);
  }
  let html = '';
  for (const [cat, feeds] of Object.entries(cats)) {
    if (cat) html += '<div class="sidebar-section">'+esc(cat)+'</div>';
    for (const f of feeds) {
      const unread = ALL_ARTICLES.filter(a=>a.feedUrl===f.url&&!isRead(a.id)).length;
      const badge = unread>0 ? '<span class="nav-badge">'+unread+'</span>' : '';
      html += '<div class="nav-item" data-feed="'+esc(f.url)+'" onclick="selectFeed(this)">'
        +'<span class="feed-dot" style="background:'+feedColor(f.url)+'"></span>'
        +'<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(f.feedTitle)+'</span>'
        +badge+'</div>';
    }
  }
  document.getElementById('feed-list').innerHTML = html;
}

function setFilter(el) {

let _st=null;
function onSearch(e) {
  state.search = e.target.value;

function applyView() {
  let list = [...ALL_ARTICLES];
  if (state.feedUrl) list = list.filter(a=>a.feedUrl===state.feedUrl);
  const now = Date.now(), todayCutoff = now - 86400000;
  if (state.view==='unread') list=list.filter(a=>!isRead(a.id));
  else if (state.view==='starred') list=list.filter(a=>isStarred(a.id));
  else if (state.view==='today') list=list.filter(a=>(a.publishedAt||0)>=todayCutoff);
  if (state.filter==='unread') list=list.filter(a=>!isRead(a.id));
  else if (state.filter==='starred') list=list.filter(a=>isStarred(a.id));
  if (state.search) {
    const q = state.search.toLowerCase();
    list = list.filter(a => a.title.toLowerCase().includes(q) || a.feedTitle.toLowerCase().includes(q) || (a.description||'').toLowerCase().includes(q));
  }
  list.sort((a,b)=>(b.publishedAt||0)-(a.publishedAt||0));
  state.visible = list;
  renderList();
}

const PAGE_SIZE = 50;
let listPage = 1;

function renderList() {
  listPage = 1;
  if (_observer) { _observer.disconnect(); _observer = null; }
  renderListPage(true);
}

function renderListPage(reset) {
  const scroll = document.getElementById('list-scroll');
  const empty = document.getElementById('list-empty');
  if (reset) scroll.querySelectorAll('.article-row,#scroll-sentinel').forEach(e=>e.remove());
  const batch = reset
    ? state.visible.slice(0, listPage * PAGE_SIZE)
    : state.visible.slice((listPage - 1) * PAGE_SIZE, listPage * PAGE_SIZE);
  if (reset && batch.length === 0) { empty.style.display='block'; return; }
  empty.style.display='none';
  const frag = document.createDocumentFragment();
  for (const a of batch) {
    const div = document.createElement('div');
    div.className='article-row'+(isRead(a.id)?' read':'')+(a.id===state.selected?' selected':'');
    div.dataset.id=a.id;
    div.innerHTML='<div class="row-top"><div class="unread-dot"></div><div class="row-feed">'+esc(a.feedTitle)+'</div><div class="row-date">'+relTime(a.publishedAt)+'</div></div>'
      +'<div class="row-title">'+esc(a.title)+(a.clusterSize>1?'<span class="cluster-badge">'+a.clusterSize+' sources</span>':'')+'</div>'
      +(a.description?'<div class="row-desc">'+esc(a.description)+'</div>':'');
    div.onclick=()=>open(a.id);
    frag.appendChild(div);
  }
  // Remove old sentinel before appending new rows
  scroll.querySelector('#scroll-sentinel')?.remove();
  scroll.appendChild(frag);
  if (reset && !_bootRestored) { _bootRestored = true; restoreScrollAnchor(); }
  // Attach infinite-scroll sentinel if more pages remain
  if (state.visible.length > listPage * PAGE_SIZE) {
    const sentinel = document.createElement('div');
    sentinel.id = 'scroll-sentinel';
    sentinel.style.height = '1px';
    scroll.appendChild(sentinel);
    if (_observer) _observer.disconnect();
    _observer = new IntersectionObserver(([e]) => {
      if (!e.isIntersecting || _loadingMore) return;
      _loadingMore = true;
      listPage++;
      renderListPage(false);
      _loadingMore = false;
    }, { root: scroll, rootMargin: '400px' });
    _observer.observe(sentinel);
  }
}

function markAllRead() {
  for (const a of state.visible) setRead(a.id,true);
  document.querySelectorAll('.article-row').forEach(r=>r.classList.add('read'));
  renderSidebar();
}
function showList() {
  document.getElementById('list-pane').classList.remove('hidden');
  document.getElementById('reader-pane').classList.remove('visible');
}

document.addEventListener('keydown', e=>{
  if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if(e.key==='j') nav(1);
  else if(e.key==='k') nav(-1);
  else if(e.key==='u') toggleUnread();
  else if(e.key==='s') toggleStar();
  else if(e.key==='Escape') { if(isMobile()) showList(); }
  else if(e.key==='/') { e.preventDefault(); const si=document.getElementById('search-input'); if(si){si.focus();si.select();} }
  else if(e.key==='o'&&state.selected) {
    const a=ALL_ARTICLES.find(x=>x.id===state.selected);
    if(a) window.open(a.url,'_blank','noopener');
  }
});

boot();
</script>
</body>
</html>
