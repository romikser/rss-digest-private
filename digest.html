<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSS Reader</title>
<style>
:root{--bg:#0f0f0f;--bg2:#141414;--bg3:#1a1a1a;--bg4:#222;--border:rgba(255,255,255,0.08);--text:#e2e2e2;--text2:#999;--text3:#666;--accent:#378ADD;--accent-bg:rgba(55,138,221,0.12);--star:#BA7517;--radius:8px;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;--font-serif:Georgia,"Times New Roman",serif}
@media(prefers-color-scheme:light){:root{--bg:#f2f1f0;--bg2:#e8e7e5;--bg3:#fff;--bg4:#f8f7f6;--border:rgba(0,0,0,0.09);--text:#111;--text2:#555;--text3:#999;--accent:#185FA5;--accent-bg:rgba(24,95,165,0.1);--star:#854F0B}}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column}
#app{display:flex;flex:1;overflow:hidden}
#sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#sidebar-scroll{flex:1;overflow-y:auto;padding:8px 0 16px}
#list-pane{width:300px;flex-shrink:0;border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#reader-pane{flex:1;display:flex;flex-direction:column;overflow:hidden}
.sidebar-section{padding:16px 12px 4px;font-size:10.5px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--text3)}
.nav-item{display:flex;align-items:center;gap:8px;padding:6px 10px;margin:1px 6px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);user-select:none}
.nav-item:hover{background:var(--border);color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent)}
.nav-badge{margin-left:auto;font-size:10.5px;font-weight:500;background:var(--bg4);color:var(--text3);border-radius:9px;padding:1px 6px;min-width:20px;text-align:center}
.nav-item.active .nav-badge{background:var(--accent-bg);color:var(--accent)}
.feed-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sidebar-divider{height:0.5px;background:var(--border);margin:8px 14px}
#list-toolbar{padding:9px 12px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
#list-title{font-size:13.5px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill-row{display:flex;gap:3px}
.pill{padding:3px 9px;border-radius:99px;font-size:11px;cursor:pointer;background:var(--bg4);color:var(--text2);border:0.5px solid var(--border);user-select:none}
.pill.active{background:var(--accent-bg);color:var(--accent);border-color:transparent}
#list-scroll{flex:1;overflow-y:auto;min-height:0}
#list-empty{padding:48px 20px;text-align:center;font-size:13px;color:var(--text3);display:none}
.article-row{display:flex;align-items:flex-start;gap:10px;padding:11px 12px;border-bottom:0.5px solid var(--border);cursor:pointer;user-select:none}
.row-content{flex:1;min-width:0}
.row-thumb{width:56px;height:56px;object-fit:cover;border-radius:5px;flex-shrink:0;margin-top:1px}
.article-row:hover{background:var(--bg4)}
.article-row.selected{background:var(--accent-bg)}
.row-top{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.unread-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;transition:opacity .15s}
.article-row.read .unread-dot{opacity:0}
.row-feed{font-size:11px;color:var(--text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.article-row.selected .row-feed,.article-row.selected .row-date{color:var(--accent);opacity:.7}
.row-date{font-size:11px;color:var(--text3);flex-shrink:0}
.row-title{font-size:13px;font-weight:500;line-height:1.38;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.article-row.selected .row-title{color:var(--accent)}
.row-desc{font-size:11.5px;color:var(--text2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.article-row.selected .row-desc{color:var(--accent);opacity:.7}
.cluster-badge{font-size:10px;background:rgba(186,117,23,.15);color:var(--star);border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:500}
#list-keyhints{padding:7px 12px;border-top:0.5px solid var(--border);display:flex;gap:12px;flex-wrap:wrap;flex-shrink:0}
.hint{font-size:10.5px;color:var(--text3)}
.hint kbd{display:inline-block;background:var(--bg4);border:0.5px solid var(--border);border-radius:3px;padding:0 4px;font-family:monospace;font-size:10px;color:var(--text2);margin:0 1px}
#above-count{font-size:11px;font-weight:600;color:var(--accent);cursor:pointer;flex-shrink:0;min-width:28px;display:none}
#above-count.visible{display:block}
#reader-toolbar{padding:9px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.icon-btn{background:none;border:0.5px solid transparent;border-radius:6px;cursor:pointer;color:var(--text2);padding:4px 6px;font-size:15px;display:flex;align-items:center;gap:4px}
.icon-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--border)}
.icon-btn.on{color:var(--star)}
#reader-toolbar-right{display:flex;gap:4px;margin-left:auto}
#reader-scroll{flex:1;overflow-y:auto;min-height:0}
#reader-inner{max-width:660px;padding:24px 28px 60px;margin:0 auto}
#reader-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:13px;flex-direction:column;gap:8px}
.reader-meta{font-size:11.5px;color:var(--text3);margin-bottom:8px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.reader-feed-badge{background:var(--accent-bg);color:var(--accent);font-size:11px;padding:2px 7px;border-radius:4px;font-weight:500}
#reader-title{font-size:22px;font-weight:600;line-height:1.3;margin-bottom:16px}
.reader-summary-block{font-size:13px;background:var(--bg2);border-left:2px solid var(--accent);border-radius:0 6px 6px 0;padding:10px 14px;color:var(--text2);margin-bottom:18px;line-height:1.6}
.reader-summary-label{font-size:10px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
#reader-hero{width:100%;max-height:260px;object-fit:cover;border-radius:var(--radius);margin-bottom:18px;display:block}
#reader-body{font-family:var(--font-serif);font-size:16px;line-height:1.75;color:var(--text2)}
#reader-body p{margin-bottom:1em}
#reader-open-link{margin-top:20px;display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--accent);text-decoration:none;border:0.5px solid var(--border);border-radius:6px;padding:7px 12px}
.generated-badge{font-size:11px;color:var(--text3);padding:4px 8px;background:var(--bg4);border-radius:4px;white-space:nowrap}
@keyframes spin{to{transform:rotate(360deg)}}
#search-row{padding:5px 12px;border-bottom:0.5px solid var(--border);flex-shrink:0}
#search-input{width:100%;background:var(--bg4);border:0.5px solid var(--border);border-radius:6px;padding:5px 10px;font-size:12.5px;color:var(--text);outline:none;font-family:var(--font)}
#search-input::placeholder{color:var(--text3)}
#search-input:focus{border-color:var(--accent);background:var(--bg3)}
@media(max-width:900px){#sidebar{display:none}#list-pane{width:280px}}
@media(max-width:600px){#list-pane{width:100%;display:flex}#reader-pane{display:none}#list-pane.hidden{display:none}#reader-pane.visible{display:flex;width:100%}#back-btn{display:flex !important}}
#back-btn{display:none}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-scroll">
      <div class="sidebar-section">Smart views</div>
      <div class="nav-item active" data-view="all" data-label="All articles" onclick="selectView(this)"><span>⊞</span> All articles <span class="nav-badge" id="badge-all">—</span></div>
      <div class="nav-item" data-view="unread" data-label="Unread" onclick="selectView(this)"><span>●</span> Unread <span class="nav-badge" id="badge-unread">—</span></div>
      <div class="nav-item" data-view="starred" data-label="Starred" onclick="selectView(this)"><span>★</span> Starred <span class="nav-badge" id="badge-starred">—</span></div>
      <div class="nav-item" data-view="today" data-label="Today" onclick="selectView(this)"><span>◷</span> Today <span class="nav-badge" id="badge-today">—</span></div>
      <div class="sidebar-divider"></div>
      <div id="feed-list"></div>
    </div>
  </div>
  <div id="list-pane">
    <div id="list-toolbar">
      <span id="above-count" onclick="scrollListTop()" title="Scroll to top"></span>
      <span id="list-title">All articles</span>
      <div class="pill-row">
        <div class="pill active" data-filter="all" onclick="setFilter(this)">All</div>
        <div class="pill" data-filter="unread" onclick="setFilter(this)">Unread</div>
        <div class="pill" data-filter="starred" onclick="setFilter(this)">Starred</div>
      </div>
    </div>
    <div id="search-row"><input id="search-input" type="search" placeholder="Search articles…" oninput="onSearch(event)"></div>
    <div id="list-scroll"><div id="list-empty">No articles</div></div>
    <div id="list-keyhints">
      <span class="hint"><kbd>j</kbd><kbd>k</kbd> navigate</span>
      <span class="hint"><kbd>u</kbd> unread</span>
      <span class="hint"><kbd>s</kbd> star</span>
      <span class="hint"><kbd>o</kbd> open</span>
      <span class="hint"><kbd>/</kbd> search</span>
    </div>
  </div>
  <div id="reader-pane">
    <div id="reader-toolbar">
      <button class="icon-btn" id="back-btn" onclick="showList()" title="Back to list">←</button>
      <button class="icon-btn" onclick="nav(-1)">↑</button>
      <button class="icon-btn" onclick="nav(1)">↓</button>
      <div id="reader-toolbar-right">
        <button class="icon-btn" id="btn-star" onclick="toggleStar()">☆</button>
        <button class="icon-btn" id="btn-unread" onclick="toggleUnread()">◎</button>
        <button class="icon-btn" onclick="markAllRead()">✓ All read</button>
        <a class="icon-btn" href="http://127.0.0.1:18789/plugins/rss-digest/refresh" target="_blank" rel="noopener" title="Fetch new articles">↻</a>
      </div>
    </div>
    <div id="reader-scroll">
      <div id="reader-empty">
        <span>Select an article</span>
        <span class="generated-badge" id="gen-badge"></span>
      </div>
      <div id="reader-inner" style="display:none"></div>
    </div>
  </div>
</div>

ally happens when special characters like <code>@</code>, <code>/</code>, or <code>\"</code> appear in a password without proper quoting, causing Oracle's internal parser to misinterpret the credential string. It is one of the most common login issues in environments en","author":"umzzil nng","clusterSize":33},{"id":"b4fddef576382695","feedUrl":"https://lobste.rs/rss","feedTitle":"Lobsters","title":"Stop Killing the Internet","url":"https://www.stopkillingtheinternet.com/","publishedAt":1782869536000,"description":"<p><a href=\"https://lobste.rs/s/pdkrax/stop_killing_internet\">Comments</a></p>","author":"stopkillingtheinternet.com via ecksdee","clusterSize":33},{"id":"5d4b4eeffe0e67c3","feedUrl":"https://lobste.rs/rss","feedTitle":"Lobsters","title":"What happened to the fight for the internet?","url":"https://dustycloud.org/blog/what-happened-to-the-fight-for-the-internet/","publishedAt":1782865026000,"description":"<p><a href=\"https://lobste.rs/s/rfkmw3/what_happened_fight_for_internet\">Comments</a></p>","author":"dustycloud.org by dustyweb","clusterSize":33},{"id":"86826ad2b3533d2c","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"PostgreSQL 39P01 Error: Causes and Solutions Complete Guide","url":"https://dev.to/dbmserror/postgresql-39p01-error-causes-and-solutions-complete-guide-cne","publishedAt":1782864185000,"description":"<h2> PostgreSQL Error 39P01: trigger protocol violated </h2> <p>The <code>39P01 trigger protocol violated</code> error occurs when a trigger function fails to comply with PostgreSQL's internal trigger calling convention. This typically means the function is not returning the correct type or value expected by the trigger dispatcher. Unlike regular functions, trigger functions must be declared with <code>RETURNS trigger</code> and must return <code>NEW</code>, <code>OLD</code>, or <code>NULL</code","author":"umzzil nng","clusterSize":33},{"id":"863290ae6b18aca1","feedUrl":"https://lobste.rs/rss","feedTitle":"Lobsters","title":"jj jj jj jj jj","url":"https://caiustheory.com/jj-jj-jj-jj-jj/","publishedAt":1782857799000,"description":"<p><a href=\"https://lobste.rs/s/96kp1m/jj_jj_jj_jj_jj\">Comments</a></p>","author":"caiustheory.com by caius","clusterSize":33},{"id":"5cab5fb4781f71a5","feedUrl":"https://lobste.rs/rss","feedTitle":"Lobsters","title":"The Threat of Residential Proxies","url":"https://www.feistyduck.com/newsletter/issue_138_the_threat_of_residential_proxies","publishedAt":1782848585000,"description":"<p><a href=\"https://lobste.rs/s/x8qug8/threat_residential_proxies\">Comments</a></p>","author":"feistyduck.com via fanf","clusterSize":33},{"id":"49f9af7dd5ba02e5","feedUrl":"https://lobste.rs/rss","feedTitle":"Lobsters","title":"Claude Code Is Steganographically Marking Requests","url":"https://thereallo.dev/blog/claude-code-prompt-steganography","publishedAt":1782846284000,"description":"<p><a href=\"https://lobste.rs/s/qs2sxd/claude_code_is_steganographically\">Comments</a></p>","author":"thereallo.dev via alexjs","clusterSize":33},{"id":"99d30c447374a2a2","feedUrl":"https://lobste.rs/rss","feedTitle":"Lobsters","title":"Generating the P3 Tiling","url":"https://k-monk.org/blog/generating-the-p3-tiling/","publishedAt":1782844747000,"description":"<p><a href=\"https://lobste.rs/s/uaubz8/generating_p3_tiling\">Comments</a></p>","author":"k-monk.org by k-monk","clusterSize":33},{"id":"a355f408cebe0740","feedUrl":"https://lobste.rs/rss","feedTitle":"Lobsters","title":"Serving Local AI on my Jetson through Durable Streams","url":"https://s2.dev/blog/local-ai","publishedAt":1782835817000,"description":"<p><a href=\"https://lobste.rs/s/jiwsyd/serving_local_ai_on_my_jetson_through\">Comments</a></p>","author":"s2.dev via mesto","clusterSize":33},{"id":"db097d170892643d","feedUrl":"https://lobste.rs/rss","feedTitle":"Lobsters","title":"Parse, Don't Validate — In a Language That Doesn't Want You To","url":"https://cekrem.github.io/posts/parse-dont-validate-typescript/","publishedAt":1782831725000,"description":"<p><a href=\"https://lobste.rs/s/lzewut/parse_don_t_validate_language_doesn_t_want\">Comments</a></p>","author":"cekrem.github.io via FedericoSchonborn","clusterSize":33},{"id":"53a0060a1c4aa312","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"SQL Pattern Series #10: The Hierarchy Pattern","url":"https://dev.to/baldwin_apps/sql-pattern-series-10-the-hierarchy-pattern-ofm","publishedAt":1782830100000,"description":"<p><em>Relating rows in a table to other rows in the same table</em></p> <blockquote> <p>SQL Pattern Series #10 of 21</p> <p>A collection of practical SQL patterns that help developers recognize common solutions to recurring database problems.</p> </blockquote> <h2> What You'll Learn </h2> <p>In this article you'll learn:</p> <ul> <li>What a self-join is</li> <li>How one table can represent hierarchical relationships</li> <li>How to connect employees to managers</li> <li>When to use the Hierarch","author":"Baldwin Apps","clusterSize":33},{"id":"f9a82595bc72ba61","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"PostgreSQL 39004 Error: Causes and Solutions Complete Guide","url":"https://dev.to/dbmserror/postgresql-39004-error-causes-and-solutions-complete-guide-3m6e","publishedAt":1782828197000,"description":"<h2> PostgreSQL Error 39004: null value not allowed </h2> <p>PostgreSQL error <strong>39004</strong> occurs within procedural language functions (PL/pgSQL, PL/Perl, PL/Python) when a NULL value is assigned to a variable or parameter that explicitly disallows NULL. This typically surfaces inside stored procedures or user-defined functions where <code>NOT NULL</code> variable declarations or strict NULL-handling logic is in place. Understanding this error requires knowing where NULL enters your fu","author":"umzzil nng","clusterSize":33},{"id":"9766ca74dfea0069","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"Oracle ORA-01037 Error: Causes and Solutions Complete Guide","url":"https://dev.to/dbmserror/oracle-ora-01037-error-causes-and-solutions-complete-guide-1099","publishedAt":1782828091000,"description":"<h2> ORA-01037: Maximum Cursor Memory Exceeded — Causes, Fixes & Prevention </h2> <p>ORA-01037 is thrown by Oracle Database when a cursor attempts to use more memory than the system allows for cursor operations. This typically happens during parsing or execution of SQL statements that demand excessive memory, or when too many cursors are left open simultaneously. Left unresolved, this error can cause application failures and service outages in production environments.</p> <h2> Top 3 Causes </h2>","author":"umzzil nng","clusterSize":33},{"id":"d524adba38f73009","feedUrl":"https://lobste.rs/rss","feedTitle":"Lobsters","title":"Slint and the Node.js Event Loop","url":"https://slint.dev/blog/slint-and-the-nodejs-event-loop","publishedAt":1782827103000,"description":"<p><a href=\"https://lobste.rs/s/mml4wf/slint_node_js_event_loop\">Comments</a></p>","author":"slint.dev by ogoffart","clusterSize":33},{"id":"e5cdfbac193b9bfe","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"Data Migration: SQL Server to PostgreSQL — the Complete Guide","url":"https://dev.to/marcus1968/data-migration-sql-server-to-postgresql-the-complete-guide-4mgk","publishedAt":1782823596000,"description":"<p>A <strong>data migration</strong> from SQL Server to PostgreSQL rarely fails at actually copying the data. It fails at the silent differences that only surface in the target: <code>datetime</code>, which knows no time zone, <code>bit</code>, which is not a <code>boolean</code>, an <code>IDENTITY</code> that turns into a sequence, and a collation that suddenly compares case-sensitively. Anyone who sets out to <strong>migrate SQL Server to PostgreSQL</strong> isn't just copying tables — they're","author":"Marcus","clusterSize":33},{"id":"02891f99d5766f99","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"PostgreSQL Logical Replication for CDC: Slots, Publications & Conflict Handling","url":"https://dev.to/gowthampotureddi/postgresql-logical-replication-for-cdc-slots-publications-conflict-handling-5b1f","publishedAt":1782820938000,"description":"<p><strong><code>postgres logical replication</code></strong> is the quiet plumbing under almost every modern CDC pipeline — and the part of Postgres senior data engineers most often handwave through until a phantom replication slot fills the source disk at 3am and the on-call shift becomes a forensic investigation. Streaming replication ships byte-for-byte WAL between Postgres instances; <code>pg_logical</code> ships <em>decoded SQL-level changes</em> — INSERT / UPDATE / DELETE rows with column","author":"Gowtham Potureddi","clusterSize":33},{"id":"ccc14e8584c0eba3","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"PostgreSQL MVCC & VACUUM: Bloat, Wraparound, Autovacuum Tuning in Production","url":"https://dev.to/gowthampotureddi/postgresql-mvcc-vacuum-bloat-wraparound-autovacuum-tuning-in-production-1l9n","publishedAt":1782820802000,"description":"<p><strong><code>postgres vacuum</code></strong> is the single most under-asked-about Postgres operational knob a senior data engineer has to own, and the one most teams discover the hard way the first time a 200 GB table refuses writes at 03:00 because the transaction ID counter is two days from wraparound. <code>postgresql mvcc</code> is what makes Postgres concurrent at all — every UPDATE writes a new tuple version and marks the old one for later cleanup — and <code>postgres autovacuum</code>","author":"Gowtham Potureddi","clusterSize":33},{"id":"fdb9e0867c3896f2","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"BigQuery Studio + Gemini: Notebooks, Data Canvas & AI-Assisted SQL","url":"https://dev.to/gowthampotureddi/bigquery-studio-gemini-notebooks-data-canvas-ai-assisted-sql-2iin","publishedAt":1782820645000,"description":"<p><strong><code>bigquery studio</code></strong> is the single biggest workbench change Google has shipped to BigQuery since the standard-SQL migration in 2018 — and the one most senior data engineers underuse, because they still think of BQ as \"the SQL console plus the API\" instead of as a unified workspace where SQL, Python notebooks, visual pipelines, and <code>bigquery gemini</code> assistance all share the same query engine. In 2026, the GCP console's default BQ entry point is Studio, the G","author":"Gowtham Potureddi","clusterSize":33},{"id":"87c0edce4eda1d8b","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"BigQuery Reservations, Editions & Slot Management: FinOps for Analytics Teams","url":"https://dev.to/gowthampotureddi/bigquery-reservations-editions-slot-management-finops-for-analytics-teams-dpb","publishedAt":1782820430000,"description":"<p><strong><code>bigquery slots</code></strong> are the single most misunderstood unit in the entire Google Cloud analytics stack — and the one most platform teams discover too late, usually right after the first month-end bill in which a single ad-hoc query melted a quarter of the budget. A slot is not a thread. It is not a row. It is not a query. It is a unit of CPU plus memory plus shuffle bandwidth, billed by the millisecond, that BigQuery dispatches in parallel across every sub-step of a qu","author":"Gowtham Potureddi","clusterSize":33},{"id":"1c17397d0d6d3dd5","feedUrl":"https://lobste.rs/rss","feedTitle":"Lobsters","title":"Diagrams for Penrose Tiles","url":"https://readerunner.wordpress.com/2021/09/13/diagrams-for-penrose-tiles/","publishedAt":1782817986000,"description":"<p><a href=\"https://lobste.rs/s/rrtmck/diagrams_for_penrose_tiles\">Comments</a></p>","author":"readerunner.wordpress.com via adamshaylor","clusterSize":33},{"id":"d605a3cc15324dc5","feedUrl":"https://lobste.rs/rss","feedTitle":"Lobsters","title":"Proving the Fundamental Theorem of Arithmetic in Agda","url":"https://byorgey.github.io/blog/posts/2026/06/26/FTA.lagda.html","publishedAt":1782817841000,"description":"<p><a href=\"https://lobste.rs/s/s61wns/proving_fundamental_theorem_arithmetic\">Comments</a></p>","author":"byorgey.github.io via abhin4v","clusterSize":33},{"id":"16a13270c56222b7","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"Day 93 of Learning MERN Stack","url":"https://dev.to/ali_hamza_589ec7b3eb6688d/day-93-of-learning-mern-stack-1n6b","publishedAt":1782815370000,"description":"<p>Hello Dev Community! 👋</p> <p>It is officially <strong>Day 93</strong> of my 100-day full-stack engineering run! 🎯 We are just 7 days away from completing the ultimate goal. Today was an absolute powerhouse session—instead of slowing down, I accelerated and knocked down <strong>5 advanced SQL challenges</strong> on HackerRank in a single day! </p> <p>From intricate bi-directional string exclusions using <code>NOT REGEXP</code> to building multi-layered recursive-like node diagnostics using ","author":"Ali Hamza","clusterSize":33},{"id":"f039ab3095008e6e","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"Day 92 of Learning MERN Stack","url":"https://dev.to/ali_hamza_589ec7b3eb6688d/day-92-of-learning-mern-stack-1ck0","publishedAt":1782814280000,"description":"<p>Hello Dev Community! 👋</p> <p>It is officially <strong>Day 92</strong> of my 100-day backend and database engineering sprint! 🎯 Yesterday, I tackled complex string transformations like \"The PADS\". Today, I focused heavily on scoped mathematical computations and structural filters on HackerRank by mastering: <strong>Targeted Data Aggregations (<code>COUNT</code> and <code>AVG</code>) combined with strict Attribute Filtering!</strong> 📊🔢</p> <p>When building management portals or dashboard ","author":"Ali Hamza","clusterSize":33},{"id":"debc75de8249fa3f","feedUrl":"https://dev.t RA-01036 is thrown by Oracle Database when a bind variable used in a SQL statement has an invalid name, an incorrect number of parameters, or a mismatch between the declared bind variables and those supplied by the application. This error is common in applications built with JDBC, cx_Oracle, ODP.NET, or Pro*C, and it often appears during dynamic SQL execution. Understanding the root cause quickly can save ho","author":"umzzil nng","clusterSize":33},{"id":"b2081b5edd3019f8","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"Day 90 of Learning MERN Stack","url":"https://dev.to/ali_hamza_589ec7b3eb6688d/day-90-of-learning-mern-stack-2j7m","publishedAt":1782813575000,"description":"<p>Hello Dev Community! 👋</p> <p>It is officially <strong>Day 90</strong> of my 100-day full-stack and database engineering sprint! 🎯 Reaching the 90-day mark feels incredible. Yesterday, I worked with basic directional string filters. Today, I tackled compound textual intersections and text negation boundaries on HackerRank by mastering: <strong>Bi-Directional REGEXP Matching and Inverse Character Constraints!</strong> 🔍💥</p> <p>In enterprise backend applications, data filtering isn't alway","author":"Ali Hamza","clusterSize":33},{"id":"e0e7ab96ce64abad","feedUrl":"https://lobste.rs/rss","feedTitle":"Lobsters","title":"Local Reasoning for Global Properties","url":"https://tratt.net/laurie/blog/2026/local_reasoning_for_global_properties.html","publishedAt":1782813496000,"description":"<p><a href=\"https://lobste.rs/s/4rfzbl/local_reasoning_for_global_properties\">Comments</a></p>","author":"tratt.net by ltratt","clusterSize":33},{"id":"e4945d22d5edd0b0","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"Day 89 of Learning MERN Stack","url":"https://dev.to/ali_hamza_589ec7b3eb6688d/day-89-of-learning-mern-stack-4h0n","publishedAt":1782813331000,"description":"<p>Hello Dev Community! 👋</p> <p>It is officially <strong>Day 89</strong> const {articles: ALL_ARTICLES, feeds: ALL_FEEDS, generatedAt, totalNew} = __DATA__;

const LS_READ = 'rss:read:';
const LS_STAR = 'rss:star:';
const COLORS = ['#378ADD','#1D9E75','#D85A30','#7F77DD','#D4537E','#BA7517','#639922','#888780','#E24B4A'];
const feedColors = {};
let colorIdx = 0;
function feedColor(url) {
  if (!feedColors[url]) feedColors[url] = COLORS[colorIdx++ % COLORS.length];
  return feedColors[url];
}

let state = { view:'all', filter:'all', feedUrl:null, selected:null, visible:[], search:'' };
let _ignoreScroll = false;
let _scrollTimer = null;
let _bootRestored = false;

function isRead(id) { return !!localStorage.getItem(LS_READ+id); }
function isStarred(id) { return !!localStorage.getItem(LS_STAR+id); }
function setRead(id, v) { v ? localStorage.setItem(LS_READ+id,'1') : localStorage.removeItem(LS_READ+id); }
function setStar(id, v) { v ? localStorage.setItem(LS_STAR+id,'1') : localStorage.removeItem(LS_STAR+id); }

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function relTime(ms) {
  if (!ms) return '';
  const d = Math.floor((Date.now()-ms)/1000);
  if (d<60) return 'just now';
  if (d<3600) return Math.floor(d/60)+'m ago';
  if (d<86400) return Math.floor(d/3600)+'h ago';
  return Math.floor(d/86400)+'d ago';
}

function getTopmostArticleId() {
  const sc = document.getElementById('list-scroll');
  if (!sc) return null;
  const top = sc.getBoundingClientRect().top;
  for (const r of sc.querySelectorAll('.article-row'))
    if (r.getBoundingClientRect().bottom > top + 10) return r.dataset.id;
  return null;
}
function saveScrollAnchor(id) {
  try { localStorage.setItem('rss:anchor', id || getTopmostArticleId() || ''); } catch {}
}
function markScrolledPastRead() {
  if (_ignoreScroll) return;
  const sc = document.getElementById('list-scroll');
  if (!sc) return;
  const top = sc.getBoundingClientRect().top;
  let changed = false;
  for (const row of sc.querySelectorAll('.article-row')) {
    if (row.getBoundingClientRect().bottom >= top) break;
    const id = row.dataset.id;
    if (!isRead(id)) { setRead(id, true); row.classList.add('read'); changed = true; }
  }
  if (changed) renderSidebar();
  saveScrollAnchor();
}
function onListScroll() {

  if (_ignoreScroll) return;
  clearTimeout(_scrollTimer);
  _scrollTimer = setTimeout(markScrolledPastRead, 300);
}
function restoreScrollAnchor() {
  let id; try { id = localStorage.getItem('rss:anchor'); } catch {}
  if (!id) return;
  const row = document.querySelector('.article-row[data-id="' + id + '"]');
  if (!row) return;
  _ignoreScroll = true;
  row.scrollIntoView({ block: 'start' });
  setTimeout(() => { _ignoreScroll = false; }, 600);
}

function boot() {
  const d = new Date(generatedAt);
  document.getElementById('gen-badge').textContent =
    'Updated ' + d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  document.getElementById('list-scroll').addEventListener('scroll', onListScroll, { passive: true });
  renderSidebar();
  applyView();
}

function renderSidebar() {
  const now = Date.now(), todayCutoff = now - 86400000;
  let totalUnread=0, totalStarred=0, todayCount=0;
  for (const a of ALL_ARTICLES) {
    if (!isRead(a.id)) totalUnread++;
    if (isStarred(a.id)) totalStarred++;
    if ((a.publishedAt||0) >= todayCutoff) todayCount++;
  }
  document.getElementById('badge-all').textContent = ALL_ARTICLES.length;
  document.getElementById('badge-unread').textContent = totalUnread;
  document.getElementById('badge-starred').textContent = totalStarred;
  document.getElementById('badge-today').textContent = todayCount;

  const cats = {};
  for (const f of ALL_FEEDS) {
    const cat = f.category||'';
    if (!cats[cat]) cats[cat]=[];
    cats[cat].push(f);
  }
  let html = '';
  for (const [cat, feeds] of Object.entries(cats)) {
    if (cat) html += '<div class="sidebar-section">'+esc(cat)+'</div>';
    for (const f of feeds) {
      const unread = ALL_ARTICLES.filter(a=>a.feedUrl===f.url&&!isRead(a.id)).length;
      const badge = unread>0 ? '<span class="nav-badge">'+unread+'</span>' : '';
      html += '<div class="nav-item" data-feed="'+esc(f.url)+'" onclick="selectFeed(this)">'
        +'<span class="feed-dot" style="background:'+feedColor(f.url)+'"></span>'
        +'<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(f.feedTitle)+'</span>'
        +badge+'</div>';
    }
  }
  document.getElementById('feed-list').innerHTML = html;
}

function isMobile() { return window.innerWidth <= 600; }

function selectView(el) {
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  state.view = el.dataset.view;
  state.feedUrl = null;
  document.getElementById('list-title').textContent = el.dataset.label || el.dataset.view;
  state.search = ''; const si=document.getElementById('search-input'); if(si) si.value='';
  if (isMobile()) showList();
  applyView();
}
function selectFeed(el) {
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  state.view = 'feed';
  state.feedUrl = el.dataset.feed;
  const f = ALL_FEEDS.find(x=>x.url===state.feedUrl);
  document.getElementById('list-title').textContent = f?.feedTitle||'Feed';
  state.search = ''; const si2=document.getElementById('search-input'); if(si2) si2.value='';
  if (isMobile()) showList();
  applyView();
}
function setFilter(el) {
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  state.filter = el.dataset.filter;
  applyView();
}
let _st=null;
function onSearch(e) {
  state.search = e.target.value;
  clearTimeout(_st); _st = setTimeout(applyView, 250);
}

function applyView() {
  let list = [...ALL_ARTICLES];
  if (state.feedUrl) list = list.filter(a=>a.feedUrl===state.feedUrl);
  const now = Date.now(), todayCutoff = now - 86400000;
  if (state.view==='unread') list=list.filter(a=>!isRead(a.id));
  else if (state.view==='starred') list=list.filter(a=>isStarred(a.id));
  else if (state.view==='today') list=list.filter(a=>(a.publishedAt||0)>=todayCutoff);
  if (state.filter==='unread') list=list.filter(a=>!isRead(a.id));
  else if (state.filter==='starred') list=list.filter(a=>isStarred(a.id));
  if (state.search) {
    const q = state.search.toLowerCase();
    list = list.filter(a => a.title.toLowerCase().includes(q) || a.feedTitle.toLowerCase().includes(q) || (a.description||'').toLowerCase().includes(q));
  }
  list.sort((a,b)=>(b.publishedAt||0)-(a.publishedAt||0));
  state.visible = list;
  renderList();
}

const PAGE_SIZE = 50;
let listPage = 1;

function renderList() {
  listPage = 1;
  if (_observer) { _observer.disconnect(); _observer = null; }
  renderListPage(true);
}

function renderListPage(reset) {
  const scroll = document.getElementById('list-scroll');
  const empty = document.getElementById('list-empty');
  if (reset) scroll.querySelectorAll('.article-row,#scroll-sentinel').forEach(e=>e.remove());
  const batch = reset
    ? state.visible.slice(0, listPage * PAGE_SIZE)
    : state.visible.slice((listPage - 1) * PAGE_SIZE, listPage * PAGE_SIZE);
  if (reset && batch.length === 0) { empty.style.display='block'; return; }
  empty.style.display='none';
  const frag = document.createDocumentFragment();
  for (const a of batch) {
    const div = document.createElement('div');
    div.className='article-row'+(isRead(a.id)?' read':'')+(a.id===state.selected?' selected':'');
    div.dataset.id=a.id;
    div.innerHTML='<div class="row-content"><div class="row-top"><div class="unread-dot"></div><div class="row-feed">'+esc(a.feedTitle)+'</div><div class="row-date">'+relTime(a.publishedAt)+'</div></div>'
      +'<div class="row-title">'+esc(a.title)+(a.clusterSize>1?'<span class="cluster-badge">'+a.clusterSize+' sources</span>':'')+'</div>'
      +(a.description?'<div class="row-desc">'+esc(a.description)+'</div>':'')+'</div>'
      +(a.imageUrl?'<img class="row-thumb" src="'+esc(a.imageUrl)+'" alt="" loading="lazy" onerror="this.remove()">':'');
    div.onclick=()=>open(a.id);
    frag.appendChild(div);
  }
  // Remove old sentinel before appending new rows
  scroll.querySelector('#scroll-sentinel')?.remove();
  scroll.appendChild(frag);

  if (state.visible.length > listPage * PAGE_SIZE) {
    const sentinel = document.createElement('div');
    sentinel.id = 'scroll-sentinel';
    sentinel.style.height = '1px';
    scroll.appendChild(sentinel);
    if (_observer) _observer.disconnect();
    _observer = new IntersectionObserver(([e]) => {
      if (!e.isIntersecting || _loadingMore) return;
      _loadingMore = true;
      listPage++;
      renderListPage(false);
      _loadingMore = false;
    }, { root: scroll, rootMargin: '400px' });
    _observer.observe(sentinel);
  }
}

function updateAboveCount() {

    if (row.getBoundingClientRect().bottom < top) count++;

  }
  el.textContent = count > 0 ? '↑ ' + count : '';

  html+='<a id="reader-open-link" href="'+esc(a.url)+'" target="_blank" rel="noopener">Open original ↗</a>';
  document.getElementById('reader-empty').style.display='none';
  const inner=document.getElementById('reader-inner');
  inner.innerHTML=html; inner.style.display='block';
  document.getElementById('reader-scroll').scrollTop=0;
}

function nav(dir) {
  const idx=state.visible.findIndex(a=>a.id===state.selected);
  const next=state.visible[idx+dir];
  if (next) open(next.id);
}
function toggleStar() {
  const a=ALL_ARTICLES.find(x=>x.id===state.selected); if(!a) return;
  setStar(a.id,!isStarred(a.id));
  document.getElementById('btn-star').textContent=isStarred(a.id)?'★':'☆';
  document.getElementById('btn-star').classList.toggle('on',isStarred(a.id));
  renderSidebar();
}
function toggleUnread() {
  if(!state.selected) return;
  const wasRead=isRead(state.selected);
  setRead(state.selected,!wasRead);
  const row=document.querySelector('.article-row[data-id="'+state.selected+'"]');
  if(row) row.classList.toggle('read',!wasRead);
  renderSidebar();
}
function markAllRead() {
  for (const a of state.visible) setRead(a.id,true);
  document.querySelectorAll('.article-row').forEach(r=>r.classList.add('read'));
  renderSidebar();
}
function showList() {
  document.getElementById('list-pane').classList.remove('hidden');
  document.getElementById('reader-pane').classList.remove('visible');
}

document.addEventListener('keydown', e=>{
  if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if(e.key==='j') nav(1);
  else if(e.key==='k') nav(-1);
  else if(e.key==='u') toggleUnread();
  else if(e.key==='s') toggleStar();
  else if(e.key==='Escape') { if(isMobile()) showList(); }
  else if(e.key==='/') { e.preventDefault(); const si=document.getElementById('search-input'); if(si){si.focus();si.select();} }
  else if(e.key==='o'&&state.selected) {
    const a=ALL_ARTICLES.find(x=>x.id===state.selected);
    if(a) window.open(a.url,'_blank','noopener');
  }
});

boot();
</script>
</body>
</html>
