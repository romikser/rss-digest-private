<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSS Reader</title>
<style>
:root{--bg:#0f0f0f;--bg2:#141414;--bg3:#1a1a1a;--bg4:#222;--border:rgba(255,255,255,0.08);--text:#e2e2e2;--text2:#999;--text3:#666;--accent:#378ADD;--accent-bg:rgba(55,138,221,0.12);--star:#BA7517;--radius:8px;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;--font-serif:Georgia,"Times New Roman",serif}
@media(prefers-color-scheme:light){:root{--bg:#f2f1f0;--bg2:#e8e7e5;--bg3:#fff;--bg4:#f8f7f6;--border:rgba(0,0,0,0.09);--text:#111;--text2:#555;--text3:#999;--accent:#185FA5;--accent-bg:rgba(24,95,165,0.1);--star:#854F0B}}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column}
#app{display:flex;flex:1;overflow:hidden}
#sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#sidebar-scroll{flex:1;overflow-y:auto;padding:8px 0 16px}
#list-pane{width:300px;flex-shrink:0;border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#reader-pane{flex:1;display:flex;flex-direction:column;overflow:hidden}
.sidebar-section{padding:16px 12px 4px;font-size:10.5px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--text3)}
.nav-item{display:flex;align-items:center;gap:8px;padding:6px 10px;margin:1px 6px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);user-select:none}
.nav-item:hover{background:var(--border);color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent)}
.nav-badge{margin-left:auto;font-size:10.5px;font-weight:500;background:var(--bg4);color:var(--text3);border-radius:9px;padding:1px 6px;min-width:20px;text-align:center}
.nav-item.active .nav-badge{background:var(--accent-bg);color:var(--accent)}
.feed-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sidebar-divider{height:0.5px;background:var(--border);margin:8px 14px}
#list-toolbar{padding:9px 12px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
#list-title{font-size:13.5px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill-row{display:flex;gap:3px}
.pill{padding:3px 9px;border-radius:99px;font-size:11px;cursor:pointer;background:var(--bg4);color:var(--text2);border:0.5px solid var(--border);user-select:none}
.pill.active{background:var(--accent-bg);color:var(--accent);border-color:transparent}
#list-scroll{flex:1;overflow-y:auto}
#list-empty{padding:48px 20px;text-align:center;font-size:13px;color:var(--text3);display:none}
.article-row{padding:11px 12px;border-bottom:0.5px solid var(--border);cursor:pointer;user-select:none}
.article-row:hover{background:var(--bg4)}
.article-row.selected{background:var(--accent-bg)}
.row-top{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.unread-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;transition:opacity .15s}
.article-row.read .unread-dot{opacity:0}
.row-feed{font-size:11px;color:var(--text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.article-row.selected .row-feed,.article-row.selected .row-date{color:var(--accent);opacity:.7}
.row-date{font-size:11px;color:var(--text3);flex-shrink:0}
.row-title{font-size:13px;font-weight:500;line-height:1.38;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.article-row.selected .row-title{color:var(--accent)}
.row-desc{font-size:11.5px;color:var(--text2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.article-row.selected .row-desc{color:var(--accent);opacity:.7}
.cluster-badge{font-size:10px;background:rgba(186,117,23,.15);color:var(--star);border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:500}
#list-keyhints{padding:7px 12px;border-top:0.5px solid var(--border);display:flex;gap:12px;flex-wrap:wrap;flex-shrink:0}
.hint{font-size:10.5px;color:var(--text3)}
.hint kbd{display:inline-block;background:var(--bg4);border:0.5px solid var(--border);border-radius:3px;padding:0 4px;font-family:monospace;font-size:10px;color:var(--text2);margin:0 1px}
#load-more{padding:12px;text-align:center;font-size:12px;color:var(--text3);cursor:pointer;border-top:0.5px solid var(--border)}
#reader-toolbar{padding:9px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.icon-btn{background:none;border:0.5px solid transparent;border-radius:6px;cursor:pointer;color:var(--text2);padding:4px 6px;font-size:15px;display:flex;align-items:center;gap:4px}
.icon-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--border)}
.icon-btn.on{color:var(--star)}
#reader-toolbar-right{display:flex;gap:4px;margin-left:auto}
#reader-scroll{flex:1;overflow-y:auto}
#reader-inner{max-width:660px;padding:24px 28px 60px;margin:0 auto}
#reader-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:13px;flex-direction:column;gap:8px}
.reader-meta{font-size:11.5px;color:var(--text3);margin-bottom:8px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.reader-feed-badge{background:var(--accent-bg);color:var(--accent);font-size:11px;padding:2px 7px;border-radius:4px;font-weight:500}
#reader-title{font-size:22px;font-weight:600;line-height:1.3;margin-bottom:16px}
.reader-summary-block{font-size:13px;background:var(--bg2);border-left:2px solid var(--accent);border-radius:0 6px 6px 0;padding:10px 14px;color:var(--text2);margin-bottom:18px;line-height:1.6}
.reader-summary-label{font-size:10px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
#reader-hero{width:100%;max-height:260px;object-fit:cover;border-radius:var(--radius);margin-bottom:18px;display:block}
#reader-body{font-family:var(--font-serif);font-size:16px;line-height:1.75;color:var(--text2)}
#reader-body p{margin-bottom:1em}
#reader-open-link{margin-top:20px;display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--accent);text-decoration:none;border:0.5px solid var(--border);border-radius:6px;padding:7px 12px}
.generated-badge{font-size:11px;color:var(--text3);padding:4px 8px;background:var(--bg4);border-radius:4px;white-space:nowrap}
@media(max-width:900px){#sidebar{display:none}#list-pane{width:280px}}
@media(max-width:600px){#list-pane{width:100%;display:flex}#reader-pane{display:none}#list-pane.hidden{display:none}#reader-pane.visible{display:flex;width:100%}#back-btn{display:flex !important}}
#back-btn{display:none}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-scroll">
      <div class="sidebar-section">Smart views</div>
      <div class="nav-item active" data-view="all" onclick="selectView(this)"><span>⊞</span> All <span class="nav-badge" id="badge-all">—</span></div>
      <div class="nav-item" data-view="unread" onclick="selectView(this)"><span>●</span> Unread <span class="nav-badge" id="badge-unread">—</span></div>
      <div class="nav-item" data-view="starred" onclick="selectView(this)"><span>★</span> Starred <span class="nav-badge" id="badge-starred">—</span></div>
      <div class="nav-item" data-view="today" onclick="selectView(this)"><span>◷</span> Today <span class="nav-badge" id="badge-today">—</span></div>
      <div class="sidebar-divider"></div>
      <div id="feed-list"></div>
    </div>
  </div>
  <div id="list-pane">
    <div id="list-toolbar">
      <button class="icon-btn" id="back-btn" onclick="showList()">←</button>
      <span id="list-title">All articles</span>
      <div class="pill-row">
        <div class="pill active" data-filter="all" onclick="setFilter(this)">All</div>
        <div class="pill" data-filter="unread" onclick="setFilter(this)">Unread</div>
        <div class="pill" data-filter="starred" onclick="setFilter(this)">Starred</div>
      </div>
    </div>
    <div id="list-scroll"><div id="list-empty">No articles</div></div>
    <div id="list-keyhints">
      <span class="hint"><kbd>j</kbd><kbd>k</kbd> navigate</span>
      <span class="hint"><kbd>u</kbd> unread</span>
      <span class="hint"><kbd>s</kbd> star</span>
      <span class="hint"><kbd>o</kbd> open</span>
    </div>
  </div>
  <div id="reader-pane">
    <div id="reader-toolbar">
      <button class="icon-btn" onclick="nav(-1)">↑</button>
      <button class="icon-btn" onclick="nav(1)">↓</button>
      <div id="reader-toolbar-right">
        <button class="icon-btn" id="btn-star" onclick="toggleStar()">☆</button>
        <button class="icon-btn" id="btn-unread" onclick="toggleUnread()">◎</button>
        <button class="icon-btn" onclick="markAllRead()">✓ All read</button>
      </div>
    </div>
    <div id="reader-scroll">
      <div id="reader-empty">
        <span>Select an article</span>
        <span class="generated-badge" id="gen-badge"></span>
      </div>
      <div id="reader-inner" style="display:none"></div>
    </div>
  </div>
</div>

radaniyu","publishedAt":1782125387000,"description":"В издательстве «Медузы» вышла книга Ланы Эстемировой «Пожалуйста, живи». Написанная по-английски, она выходит в русском переводе, уже заслужив международное признание. Но и для русскоязычного читателя — особенно после 2022 года — это чтение кажется необходимым. Здесь есть и частная история (достаточно счастливого) детства в страшное время в страшном месте, и запоздалые вопросы вины и коллективной ответственности, в частности, за чеченские войны, истинный масштаб которых очевиден только сегодня, ","imageUrl":"https://meduza.io/image/attachments/images/012/268/788/small/QrsdpcP4dEWPpcNgTeznZg","clusterSize":54},{"id":"3fd203bc55c643d0","feedUrl":"https://fetchrss.com/rss/676808da6b92a0939d02e7f2676808743d681fc89304afa2.rss","feedTitle":"Вадим Лукомский – Telegram","title":"Понравилось, какие слова Гарет Бэйл подобрал, чтобы охарактеризовать современный футбол","url":"https://t.me/lukomski/6529","publishedAt":1782124940000,"description":"Понравилось, какие слова Гарет Бэйл подобрал, чтобы охарактеризовать современный футбол. Подобрал хорошие аналогии – именно описал разницу без осуждений и нытья: В последние пять лет фигура тренера стала более доминирующей. Футбол стал более тактическим. Стало меньше игры от ворот до ворот. Теперь матчи больше шахматные партии, а не баскетбол, что не так захватывает зрителя. Игроки реже идут в дриблинг, меньше берут игру на себя. Возможно, причина в тренерах, которые дают им указания, но все еще","imageUrl":"https://cdn4.telesco.pe/file/Z8xlCS8gxnRetEA0MxAT3QCrgADNNvxGqBAbFZXXW8tI9klgrC6LnvkNYTNLE2bpIFjIl9YT65WsgQKq3eE8oz9alVewKDYfymmF_9RSbpgI9EEKE24PGynh3nTtTVmlu73zJAd7eRcdrXm1G2ANavfN35eJspaKsc9Ep5NoM19B2e3K-XYWjP9sFN3IHu66z0rE0DbQPW7CcbvW43Y4eqxZuBwUkS_Vd0j5USneE_lMZ9oGFITD_9BliE5IERQ4Q4OCV3AS5v4NIx9SCzKmSE3Vk4Pl0OKl4E2NR1-wxT0vIyBdAyn4ZPrG5wWiQFEvMi1MORhcJ8N9gV32DjS4gw.jpg","clusterSize":54},{"id":"b680b07af27ef26b","feedUrl":"https://meduza.io/feed/all","feedTitle":"Умер экономи edTitle":"The Next Web","title":"SpaceX shares slide again as the post-IPO rally keeps unwinding","url":"https://thenextweb.com/news/spacex-shares-slide-again-as-the-post-ipo-rally-keeps-unwinding","publishedAt":1782122370000,"description":"SpaceX shares looked poised to fall again as US markets reopened after the long weekend, extending a slide that has already erased much of the euphoria from the largest stock-market debut in history. The stock closed last week around $185, down roughly 18 per cent from the $225.64 it touched on 16 June, four days [&hellip;] This story continues at The Next Web","imageUrl":"https://media.thenextweb.com/2026/06/spacex-ipo-oversubscribed-orders-close.avif","author":"Ana-Maria Stanciuc","clusterSize":1},{"id":"5c272fef3c3c2ae3","feedUrl":"http://feeds2.feedburner.com/thenextweb","feedTitle":"The Next Web","title":"Baden Bower tracks 12,040 AI citations across six engines to rank top publications for AI visibility","url":"https://thenextweb.com/news/baden-bower-ai-visibility-index-citations-publications","publishedAt":1782122236000,"description":"For years, brands have made media placement decisions based on a publication’s domain authority, readership numbers, and name recognition. None of those metrics measures how often a publication actually appears when someone asks an AI engine for a recommendation. That gap is what the Baden Bower AI Visibility Index 2026 was built to close. The study ran 20 buyer-intent [&hellip;] This story continues at The Next Web","imageUrl":"https://media.thenextweb.com/2026/06/baden-bower-ai-visibility-index-citations-publications.avif","author":"Kolawole Samuel Adebayo","clusterSize":1},{"id":"f4595118584d2700","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"Why most MySQL to PostgreSQL converters break — and how real engines fix it","url":"https://dev.to/hamidi_rasim_695ebc2f47a5/why-most-mysql-to-postgresql-converters-break-and-how-real-engines-fix-it-3nn4","publishedAt":1782128188000,"description":"<p>If you've ever tried converting a MySQL database to PostgreSQL (or the reverse), you've probably run into tools that do text replacement on your SQL dump.</p> <p>They work fine — until they don't.</p> <h2> Where regex converters fail </h2> <p>The edge cases pile up fast:</p> <ul> <li> <strong>Zero dates</strong> (<code>0000-00-00</code>) — PostgreSQL rejects them outright</li> <li> <strong>AUTO_INCREMENT</strong> — needs to become a proper sequence with the counter set to the right value</li>","author":"Hamidi Rasim","clusterSize":1},{"id":"99539b874948a2bc","feedUrl":"http://feeds2.feedburner.com/thenextweb","feedTitle":"The Next Web","title":"Spiro takes $55M from China’s NewTrails as it nears a $1bn valuation","url":"https://thenextweb.com/news/spiro-takes-55m-from-chinas-newtrails-as-it-nears-a-1bn-valuation","publishedAt":1782121562000,"description":"The hard part of electrifying a motorcycle in Lagos or Nairobi was never the motorcycle, it was the charging. A rider who earns by the trip cannot afford to sit for hours waiting for a battery to fill, which is why Spiro built its business around swapping instead: pull in, trade a flat pack for [&hellip;] This story continues at The Next Web","imageUrl":"https://media.thenextweb.com/2026/06/Spiro.avif","author":"Cristian Dina","clusterSize":1},{"id":"be14894158a47f97","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"PostgreSQL 25002 Error: Causes and Solutions Complete Guide","url":"https://dev.to/dbmserror/postgresql-25002-error-causes-and-solutions-complete-guide-ndo","publishedAt":1782194584000,"description":"<h2> PostgreSQL Error 25002: branch transaction already active </h2> <p>PostgreSQL error code <strong>25002</strong> (<code>branch transaction already active</code>) occurs in distributed transaction environments when a transaction branch with a specific XID (Transaction Identifier) is already active and a duplicate start attempt is made on the same branch. This error is most commonly encountered in Java EE/Jakarta EE application servers using the XA protocol (eXtended Architecture), middleware ","author":"umzzil nng","clusterSize":6},{"id":"3fe05928371cc062","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"Oracle ORA-00972 Error: Causes and Solutions Complete Guide","url":"https://dev.to/dbmserror/oracle-ora-00972-error-causes-and-solutions-complete-guide-3g8b","publishedAt":1782194484000,"description":"<h2> ORA-00972: Identifier Is Too Long — Causes, Fixes &amp; Prevention </h2> <p>ORA-00972 is thrown by Oracle Database when an object identifier—such as a table name, column name, index name, or constraint name—exceeds the maximum allowed length. In Oracle 12c Release 1 and earlier, this limit is <strong>30 bytes</strong>; from Oracle 12c Release 2 (12.2) onward, the limit was extended to <strong>128 bytes</strong>. This error frequently appears during database migrations, ORM-generated DDL dep","author":"umzzil nng","clusterSize":6},{"id":"612f1752f13b10e3","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"PostgreSQL 25001 Error: Causes and Solutions Complete Guide","url":"https://dev.to/dbmserror/postgresql-25001-error-causes-and-solutions-complete-guide-1fki","publishedAt":1782172974000,"description":"<h2> PostgreSQL Error 25001: active_sql_transaction — What It Means and How to Fix It </h2> <p>PostgreSQL error code <strong>25001 (active_sql_transaction)</strong> occurs when a command that must be executed <strong>outside</strong> of a transaction block is called while an active transaction is already in progress. In simple terms, once you've issued a <code>BEGIN</code> statement and are inside a transaction context, certain commands — such as changing the transaction isolation level after da","author":"umzzil nng","clusterSize":6},{"id":"f6bac809267fc634","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"Oracle ORA-00964 Error: Causes and Solutions Complete Guide","url":"https://dev.to/dbmserror/oracle-ora-00964-error-causes-and-solutions-complete-guide-4h1m","publishedAt":1782172883000,"description":"<h2> ORA-00964: Table Name Not in FROM List — Causes, Fixes &amp; Prevention </h2> <p>ORA-00964 is a SQL parsing error thrown by Oracle Database when a table name referenced in a query clause (such as WHERE, SELECT, or HAVING) does not appear in the FROM clause of that query or subquery. Oracle strictly requires every table or view used in a query to be declared in the FROM clause, and any violation is caught immediately at parse time before execution begins. This error is common in complex mult","author":"umzzil nng","clusterSize":6},{"id":"85982fbac8b70fcf","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"PostgreSQL 24000 Error: Causes and Solutions Complete Guide","url":"https://dev.to/dbmserror/postgresql-24000-error-causes-and-solutions-complete-guide-4gko","publishedAt":1782122582000,"description":"<h2> PostgreSQL Error 24000: Invalid Cursor State </h2> <p>PostgreSQL error <code>24000: invalid cursor state</code> occurs when you attempt to perform an operation on a cursor that is not in an appropriate state for that action — such as fetching from a cursor that was never opened, or accessing a cursor after the transaction that declared it has ended. Cursors in PostgreSQL are tightly coupled to transaction scope by default, and violating that relationship is the most common trigger for this ","author":"umzzil nng","clusterSize":6},{"id":"6db743734b92ac8b","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"Oracle ORA-00959 Error: Causes and Solutions Complete Guide","url":"https://dev.to/dbmserror/oracle-ora-00959-error-causes-and-solutions-complete-guide-3mj1","publishedAt":1782122490000,"description":"<h2> ORA-00959: Tablespace Does Not Exist — Causes, Fixes &amp; Prevention </h2> <p>ORA-00959 is thrown by Oracle when a DDL statement references a tablespace name that does not exist in the database. This commonly occurs during table or index creation, user provisioning, or data import operations where the specified tablespace name is either misspelled or simply hasn't been created yet. It's one of the most frequent errors encountered during database migrations and cross-environment deployments","author":"umzzil nng","clusterSize":6},{"id":"3d631acb2bf90ba7","feedUrl":"http://feeds2.feedburner.com/thenextweb","feedTitle":"The Next Web","title":"Indonesia turns to AI to deliver Prabowo’s biggest promises","url":"https://thenextweb.com/news/indonesia-turns-to-ai-to-deliver-prabowos-biggest-promises","publishedAt":1782120018000,"description":"The most expensive promise Prabowo Subianto made on his way to Indonesia’s presidency was lunch. His free-meals programme, budgeted at roughly $15bn to feed some 83 million children and pregnant women across an archipelago of thousands of islands, is the kind of undertaking that lives or dies on logistics. Now Jakarta wants to point artificial [&hellip;] This story continues at The Next Web","imageUrl":"https://media.thenextweb.com/2026/06/Prabowo-Subianto.avif","author":"Ana-Maria Stanciuc","clusterSize":1},{"id":"30d71b69e1fad771","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"Vector Search with Filters: pgvector vs DiskANN on HorizonDB","url":"https://dev.to/franckpachot/vector-search-with-filters-pgvector-vs-diskann-on-horizondb-i2k","publishedAt":1782119085000,"description":"<p>In a <a href=\"https://dev.to/franckpachot/no-pre-filtering-in-pgvector-means-reduced-ann-recall-1aa1\">previous post</a>, I explained that using filtering with pgvector can decrease recall in approximate nearest neighbor (ANN) searches.</p> <p>This post repeats the same experiment and dataset but compares two methods:</p> <ul> <li> <strong>pgvector with HNSW</strong>, a popular PostgreSQL extension</li> <li> <strong>HorizonDB with DiskANN</strong>, Microsoft’s vector index</li> </ul> <p>The go","author":"Franck Pachot","clusterSize":1},{"id":"851727eb5de96298","feedUrl":"http://feeds2.feedburner.com/thenextweb","feedTitle":"The Next Web","title":"China’s green-power target for AI data centres runs into the grid","url":"https://thenextweb.com/news/china-green-power-ai-data-centres-hurdles","publishedAt":1782118218000,"description":"The cleanest way to power a data centre is also the least predictable. The sun sets, the wind drops, and a server hall full of AI accelerators does not care: it wants the same steady draw at three in the morning that it wanted at noon. That mismatch is the problem now sitting between China’s [&hellip;] This story continues at The Next Web","imageUrl":"https://media.thenextweb.com/2026/06/China-flag.avif","author":"Alina Maria Stan","clusterSize":1},{"id":"47276642736af497","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"Du Tableau HTML aux Instructions SQL INSERT en Un Clic","url":"https://dev.to/circobit/du-tableau-html-aux-instructions-sql-insert-en-un-clic-od2","publishedAt":1782115200000,"description":"<p>Vous avez trouvé des données sur un site web. Vous en avez besoin dans votre base de données. Le workflow habituel : exporter en CSV, importer dans un outil SQL, gérer les incompatibilités de types, corriger les problèmes d'encodage.</p> <p>Et si vous pouviez passer directement du tableau HTML à du SQL valide ?</p> <p>Ce guide montre comment générer des instructions <code>CREATE TABLE</code> et <code>INSERT INTO</code> à partir de n'importe quel tableau web, en gérant l'inférence de types, l'","author":"circobit","clusterSize":1},{"id":"803018d8f3c8193b","feedUrl":"http://feeds2.feedburner.com/thenextweb","feedTitle":"The Next Web","title":"Seedcamp raises $320M and builds out a transatlantic bridge","url":"https://thenextweb.com/news/seedcamp-raises-320m-and-builds-out-a-transatlantic-bridge","publishedAt const {articles: ALL_ARTICLES, feeds: ALL_FEEDS, generatedAt, totalNew} = __DATA__;

const LS_READ = 'rss:read:';
const LS_STAR = 'rss:star:';
const COLORS = ['#378ADD','#1D9E75','#D85A30','#7F77DD','#D4537E','#BA7517','#639922','#888780','#E24B4A'];
const feedColors = {};
let colorIdx = 0;
function feedColor(url) {
  if (!feedColors[url]) feedColors[url] = COLORS[colorIdx++ % COLORS.length];
  return feedColors[url];
}

let state = { view:'all', filter:'all', feedUrl:null, selected:null, visible:[] };

function isRead(id) { return !!localStorage.getItem(LS_READ+id); }
function isStarred(id) { return !!localStorage.getItem(LS_STAR+id); }
function setRead(id, v) { v ? localStorage.setItem(LS_READ+id,'1') : localStorage.removeItem(LS_READ+id); }
function setStar(id, v) { v ? localStorage.setItem(LS_STAR+id,'1') : localStorage.removeItem(LS_STAR+id); }

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function relTime(ms) {
  if (!ms) return '';
  const d = Math.floor((Date.now()-ms)/1000);
  if (d<60) return 'just now';
  if (d<3600) return Math.floor(d/60)+'m ago';
  if (d<86400) return Math.floor(d/3600)+'h ago';
  return Math.floor(d/86400)+'d ago';
}

function boot() {
  const d = new Date(generatedAt);
  document.getElementById('gen-badge').textContent =
    'Updated ' + d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  renderSidebar();
  applyView();
}

function renderSidebar() {
  const now = Date.now(), todayCutoff = now - 86400000;
  let totalUnread=0, totalStarred=0, todayCount=0;
  for (const a of ALL_ARTICLES) {
    if (!isRead(a.id)) totalUnread++;
    if (isStarred(a.id)) totalStarred++;
    if ((a.publishedAt||0) >= todayCutoff) todayCount++;
  }
  document.getElementById('badge-all').textContent = ALL_ARTICLES.length;
  document.getElementById('badge-unread').textContent = totalUnread;
  document.getElementById('badge-starred').textContent = totalStarred;
  document.getElementById('badge-today').textContent = todayCount;

  const cats = {};
  for (const f of ALL_FEEDS) {
    const cat = f.category||'';
    if (!cats[cat]) cats[cat]=[];
    cats[cat].push(f);
  }
  let html = '';
  for (const [cat, feeds] of Object.entries(cats)) {
    if (cat) html += '<div class="sidebar-section">'+esc(cat)+'</div>';
    for (const f of feeds) {
      const unread = ALL_ARTICLES.filter(a=>a.feedUrl===f.url&&!isRead(a.id)).length;
      const badge = unread>0 ? '<span class="nav-badge">'+unread+'</span>' : '';
      html += '<div class="nav-item" data-feed="'+esc(f.url)+'" onclick="selectFeed(this)">'
        +'<span class="feed-dot" style="background:'+feedColor(f.url)+'"></span>'
        +'<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(f.feedTitle)+'</span>'
        +badge+'</div>';
    }
  }
  document.getElementById('feed-list').innerHTML = html;
}

function selectView(el) {
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  state.view = el.dataset.view;
  state.feedUrl = null;
  document.getElementById('list-title').textContent = el.textContent.replace(/d+/,'').trim();
  applyView();
}
function selectFeed(el) {
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  state.view = 'feed';
  state.feedUrl = el.dataset.feed;
  const f = ALL_FEEDS.find(x=>x.url===state.feedUrl);
  document.getElementById('list-title').textContent = f?.feedTitle||'Feed';
  applyView();
}
function setFilter(el) {
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  state.filter = el.dataset.filter;
  applyView();
}

function applyView() {
  let list = [...ALL_ARTICLES];
  if (state.feedUrl) list = list.filter(a=>a.feedUrl===state.feedUrl);
  const now = Date.now(), todayCutoff = now - 86400000;
  if (state.view==='unread') list=list.filter(a=>!isRead(a.id));
  else if (state.view==='starred') list=list.filter(a=>isStarred(a.id));
  else if (state.view==='today') list=list.filter(a=>(a.publishedAt||0)>=todayCutoff);
  if (state.filter==='unread') list=list.filter(a=>!isRead(a.id));
  else if (state.filter==='starred') list=list.filter(a=>isStarred(a.id));
  list.sort((a,b)=>(b.publishedAt||0)-(a.publishedAt||0));
  state.visible = list;
  renderList();
}

const PAGE_SIZE = 50;

    const more = document.createElement('div');
    more.id='load-more'; more.textContent='Load more…';
    more.onclick=()=>{listPage++;renderListPage(false);};
    scroll.appendChild(more);
  }
}

function open(id) {
  document.getElementById('list-pane').classList.add('hidden');
  document.getElementById('reader-pane').classList.add('visible');
  state.selected = id;
  document.querySelectorAll('.article-row').forEach(r=>r.classList.toggle('selected',r.dataset.id===id));
  if (!isRead(id)) {
    setRead(id,true);
    const row=document.querySelector('.article-row[data-id="'+id+'"]');
    if (row) row.classList.add('read');
    renderSidebar();
  }
  const a = ALL_ARTICLES.find(x=>x.id===id);
  if (a) renderReader(a);
}

function renderReader(a) {
  document.getElementById('btn-star').textContent = isStarred(a.id)?'★':'☆';
  document.getElementById('btn-star').classList.toggle('on',isStarred(a.id));
  let html='<div class="reader-meta"><span class="reader-feed-badge">'+esc(a.feedTitle)+'</span><span>'+relTime(a.publishedAt)+'</span></div>';
  html+='<div id="reader-title">'+esc(a.title)+'</div>';
  if (a.ollamaSummary) html+='<div class="reader-summary-block"><div class="reader-summary-label">AI summary</div>'+esc(a.ollamaSummary)+'</div>';
  if (a.imageUrl) html+='<img id="reader-hero" src="'+esc(a.imageUrl)+'" alt="" onerror="this.remove()">';
  if (a.description) html+='<div id="reader-body"><p>'+esc(a.description)+'</p></div>';
  html+='<a id="reader-open-link" href="'+esc(a.url)+'" target="_blank" rel="noopener">Open original ↗</a>';
  document.getElementById('reader-empty').style.display='none';
  const inner=document.getElementById('reader-inner');
  inner.innerHTML=html; inner.style.display='block';
  document.getElementById('reader-scroll').scrollTop=0;
}

function nav(dir) {
  const idx=state.visible.findIndex(a=>a.id===state.selected);
  const next=state.visible[idx+dir];
  if (next) open(next.id);
}
function toggleStar() {
  const a=ALL_ARTICLES.find(x=>x.id===state.selected); if(!a) return;
  setStar(a.id,!isStarred(a.id));
  document.getElementById('btn-star').textContent=isStarred(a.id)?'★':'☆';
  document.getElementById('btn-star').classList.toggle('on',isStarred(a.id));
  renderSidebar();
}
function toggleUnread() {
  if(!state.selected) return;
  const wasRead=isRead(state.selected);
  setRead(state.selected,!wasRead);
  const row=document.querySelector('.article-row[data-id="'+state.selected+'"]');
  if(row) row.classList.toggle('read',!wasRead);
  renderSidebar();
}
function markAllRead() {
  for (const a of state.visible) setRead(a.id,true);
  document.querySelectorAll('.article-row').forEach(r=>r.classList.add('read'));
  renderSidebar();
}
function showList() {
  document.getElementById('list-pane').classList.remove('hidden');
  document.getElementById('reader-pane').classList.remove('visible');
}

document.addEventListener('keydown', e=>{
  if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if(e.key==='j') nav(1);
  else if(e.key==='k') nav(-1);
  else if(e.key==='u') toggleUnread();
  else if(e.key==='s') toggleStar();
  else if(e.key==='o'&&state.selected) {
    const a=ALL_ARTICLES.find(x=>x.id===state.selected);
    if(a) window.open(a.url,'_blank','noopener');
  }
});

boot();
</script>
</body>
</html>
