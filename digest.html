<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSS Reader</title>
<style>
:root{--bg:#0f0f0f;--bg2:#141414;--bg3:#1a1a1a;--bg4:#222;--border:rgba(255,255,255,0.08);--text:#e2e2e2;--text2:#999;--text3:#666;--accent:#378ADD;--accent-bg:rgba(55,138,221,0.12);--star:#BA7517;--radius:8px;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;--font-serif:Georgia,"Times New Roman",serif}
@media(prefers-color-scheme:light){:root{--bg:#f2f1f0;--bg2:#e8e7e5;--bg3:#fff;--bg4:#f8f7f6;--border:rgba(0,0,0,0.09);--text:#111;--text2:#555;--text3:#999;--accent:#185FA5;--accent-bg:rgba(24,95,165,0.1);--star:#854F0B}}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column}
#app{display:flex;flex:1;overflow:hidden}
#sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#sidebar-scroll{flex:1;overflow-y:auto;padding:8px 0 16px}
#list-pane{width:300px;flex-shrink:0;border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#reader-pane{flex:1;display:flex;flex-direction:column;overflow:hidden}
.sidebar-section{padding:16px 12px 4px;font-size:10.5px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--text3)}
.nav-item{display:flex;align-items:center;gap:8px;padding:6px 10px;margin:1px 6px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);user-select:none}
.nav-item:hover{background:var(--border);color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent)}
.nav-badge{margin-left:auto;font-size:10.5px;font-weight:500;background:var(--bg4);color:var(--text3);border-radius:9px;padding:1px 6px;min-width:20px;text-align:center}
.nav-item.active .nav-badge{background:var(--accent-bg);color:var(--accent)}
.feed-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sidebar-divider{height:0.5px;background:var(--border);margin:8px 14px}
#list-toolbar{padding:9px 12px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
#list-title{font-size:13.5px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill-row{display:flex;gap:3px}
.pill{padding:3px 9px;border-radius:99px;font-size:11px;cursor:pointer;background:var(--bg4);color:var(--text2);border:0.5px solid var(--border);user-select:none}
.pill.active{background:var(--accent-bg);color:var(--accent);border-color:transparent}
#list-scroll{flex:1;overflow-y:auto;min-height:0}
#list-empty{padding:48px 20px;text-align:center;font-size:13px;color:var(--text3);display:none}
.article-row{display:flex;align-items:flex-start;gap:10px;padding:11px 12px;border-bottom:0.5px solid var(--border);cursor:pointer;user-select:none}
.row-content{flex:1;min-width:0}
.row-thumb{width:56px;height:56px;object-fit:cover;border-radius:5px;flex-shrink:0;margin-top:1px}
.article-row:hover{background:var(--bg4)}
.article-row.selected{background:var(--accent-bg)}
.row-top{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.unread-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;transition:opacity .15s}
.article-row.read .unread-dot{opacity:0}
.row-feed{font-size:11px;color:var(--text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.article-row.selected .row-feed,.article-row.selected .row-date{color:var(--accent);opacity:.7}
.row-date{font-size:11px;color:var(--text3);flex-shrink:0}
.row-title{font-size:13px;font-weight:500;line-height:1.38;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.article-row.selected .row-title{color:var(--accent)}
.row-desc{font-size:11.5px;color:var(--text2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.article-row.selected .row-desc{color:var(--accent);opacity:.7}
.cluster-badge{font-size:10px;background:rgba(186,117,23,.15);color:var(--star);border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:500}
#list-keyhints{padding:7px 12px;border-top:0.5px solid var(--border);display:flex;gap:12px;flex-wrap:wrap;flex-shrink:0}
.hint{font-size:10.5px;color:var(--text3)}
.hint kbd{display:inline-block;background:var(--bg4);border:0.5px solid var(--border);border-radius:3px;padding:0 4px;font-family:monospace;font-size:10px;color:var(--text2);margin:0 1px}
#above-count{font-size:11px;font-weight:600;color:var(--accent);cursor:pointer;flex-shrink:0;min-width:28px;display:none}
#above-count.visible{display:block}
#reader-toolbar{padding:9px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.icon-btn{background:none;border:0.5px solid transparent;border-radius:6px;cursor:pointer;color:var(--text2);padding:4px 6px;font-size:15px;display:flex;align-items:center;gap:4px}
.icon-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--border)}
.icon-btn.on{color:var(--star)}
#reader-toolbar-right{display:flex;gap:4px;margin-left:auto}
#reader-scroll{flex:1;overflow-y:auto;min-height:0}
#reader-inner{max-width:660px;padding:24px 28px 60px;margin:0 auto}
#reader-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:13px;flex-direction:column;gap:8px}
.reader-meta{font-size:11.5px;color:var(--text3);margin-bottom:8px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.reader-feed-badge{background:var(--accent-bg);color:var(--accent);font-size:11px;padding:2px 7px;border-radius:4px;font-weight:500}
#reader-title{font-size:22px;font-weight:600;line-height:1.3;margin-bottom:16px}
.reader-summary-block{font-size:13px;background:var(--bg2);border-left:2px solid var(--accent);border-radius:0 6px 6px 0;padding:10px 14px;color:var(--text2);margin-bottom:18px;line-height:1.6}
.reader-summary-label{font-size:10px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
#reader-hero{width:100%;max-height:260px;object-fit:cover;border-radius:var(--radius);margin-bottom:18px;display:block}
#reader-body{font-family:var(--font-serif);font-size:16px;line-height:1.75;color:var(--text2)}
#reader-body p{margin-bottom:1em}
#reader-open-link{margin-top:20px;display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--accent);text-decoration:none;border:0.5px solid var(--border);border-radius:6px;padding:7px 12px}
.generated-badge{font-size:11px;color:var(--text3);padding:4px 8px;background:var(--bg4);border-radius:4px;white-space:nowrap}
@keyframes spin{to{transform:rotate(360deg)}}
#search-row{padding:5px 12px;border-bottom:0.5px solid var(--border);flex-shrink:0}
#search-input{width:100%;background:var(--bg4);border:0.5px solid var(--border);border-radius:6px;padding:5px 10px;font-size:12.5px;color:var(--text);outline:none;font-family:var(--font)}
#search-input::placeholder{color:var(--text3)}
#search-input:focus{border-color:var(--accent);background:var(--bg3)}
@media(max-width:900px){#sidebar{display:none}#list-pane{width:280px}}
@media(max-width:600px){#list-pane{width:100%;display:flex}#reader-pane{display:none}#list-pane.hidden{display:none}#reader-pane.visible{display:flex;width:100%}#back-btn{display:flex !important}}
#back-btn{display:none}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-scroll">
      <div class="sidebar-section">Smart views</div>
      <div class="nav-item active" data-view="all" data-label="All articles" onclick="selectView(this)"><span>⊞</span> All articles <span class="nav-badge" id="badge-all">—</span></div>
      <div class="nav-item" data-view="unread" data-label="Unread" onclick="selectView(this)"><span>●</span> Unread <span class="nav-badge" id="badge-unread">—</span></div>
      <div class="nav-item" data-view="starred" data-label="Starred" onclick="selectView(this)"><span>★</span> Starred <span class="nav-badge" id="badge-starred">—</span></div>
      <div class="nav-item" data-view="today" data-label="Today" onclick="selectView(this)"><span>◷</span> Today <span class="nav-badge" id="badge-today">—</span></div>
      <div class="sidebar-divider"></div>
      <div id="feed-list"></div>
    </div>
  </div>
  <div id="list-pane">
    <div id="list-toolbar">
      <span id="above-count" onclick="scrollListTop()" title="Scroll to top"></span>
      <span id="list-title">All articles</span>
      <div class="pill-row">
        <div class="pill active" data-filter="all" onclick="setFilter(this)">All</div>
        <div class="pill" data-filter="unread" onclick="setFilter(this)">Unread</div>
        <div class="pill" data-filter="starred" onclick="setFilter(this)">Starred</div>
      </div>
    </div>
    <div id="search-row"><input id="search-input" type="search" placeholder="Search articles…" oninput="onSearch(event)"></div>
    <div id="list-scroll"><div id="list-empty">No articles</div></div>
    <div id="list-keyhints">
      <span class="hint"><kbd>j</kbd><kbd>k</kbd> navigate</span>
      <span class="hint"><kbd>u</kbd> unread</span>
      <span class="hint"><kbd>s</kbd> star</span>
      <span class="hint"><kbd>o</kbd> open</span>
      <span class="hint"><kbd>/</kbd> search</span>
    </div>
  </div>
  <div id="reader-pane">
    <div id="reader-toolbar">
      <button class="icon-btn" id="back-btn" onclick="showList()" title="Back to list">←</button>
      <button class="icon-btn" onclick="nav(-1)">↑</button>
      <button class="icon-btn" onclick="nav(1)">↓</button>
      <div id="reader-toolbar-right">
        <button class="icon-btn" id="btn-star" onclick="toggleStar()">☆</button>
        <button class="icon-btn" id="btn-unread" onclick="toggleUnread()">◎</button>
        <button class="icon-btn" onclick="markAllRead()">✓ All read</button>
        <a class="icon-btn" href="http://127.0.0.1:18789/plugins/rss-digest/refresh" target="_blank" rel="noopener" title="Fetch new articles">↻</a>
      </div>
    </div>
    <div id="reader-scroll">
      <div id="reader-empty">
        <span>Select an article</span>
        <span class="generated-badge" id="gen-badge"></span>
      </div>
      <div id="reader-inner" style="display:none"></div>
    </div>
  </div>
</div>

rk and dry ice drifts into the trees as grime MC Novelist, born just miles away, raps about a south London bus. “Four eight four! Going on raw on the 484,” he spits with a grin, bouncing like the sweaty moshpit in","author":"Dan Hancox","clusterSize":1},{"id":"14e847b4699f2f58","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"When to denormalize, when to join: A ClickHouse guide (2026)","url":"https://dev.to/manveerchawla/clickhouse-denormalization-join-guide-2026-59lg","publishedAt":1782713848000,"description":"<p>Denormalization has been the standard approach to analytical data modeling for good reason. Moving joins, lookups, and business rules out of query time and into ingestion gives you the fastest possible reads for a known access pattern. For most of the past decade, it was often the practical default for latency-sensitive analytics. Earlier columnar engines and distributed query processors could execute joins, but many workloads paid for them through higher latency, higher compute cost, spill-t","author":"Manveer Chawla","clusterSize":1},{"id":"2a8f428c3842349d","feedUrl":"http://feeds.guardian.co.uk/theguardian/culture/rss","feedTitle":"Culture | The Guardian","title":"Communion by JD Vance review – a strange, poignant book about faith and the modern world","url":"https://www.theguardian.com/books/2026/jun/29/communion-finding-my-way-back-to-faith-by-jd-vance-review-veep-behnd-the-curtains","publishedAt":1782712830000,"description":"<p>JD Vance’s Christian vision is thoughtful – but impossible to square with the political company he keeps</p><p>At the heart of this strange, perhaps rather poignant, book is the biblical question: “What must I do to be saved?” Not in the crude sense of how to secure a place in heaven, but as an urgent challenge to a whole repertoire of destructive assumptions and habits endorsed by the majority culture. Vance’s famous first book, <a href=\"https://www.theguardian.com/books/2016/dec/07/hillbill","author":"Rowan Williams","clusterSize":1},{"id":"bce7a1b8f367e458","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"Why Learning Data Analytics in Bangalore Can Transform Your Career","url":"https://dev.to/chitra_lekha_a5b1961449a5/why-learning-data-analytics-in-bangalore-can-transform-your-career-3l8n","publishedAt":1782713322000,"description":"<p>In today’s tech-driven world, data is everywhere. From apps and websites to businesses and startups, every decision is backed by data. That’s where data analytics comes in.<br> If you're looking to build a future-proof career, enrolling in a Data Analytics Course in Bangalore can be a game-changer.</p> <p><strong>💡 Why Data Analytics?</strong><br> Data analytics helps organizations:<br> Make smarter business decisions<br> Understand customer behavior<br> Improve performance and efficiency<br","author":"chitra lekha","clusterSize":1},{"id":"ea537225eb1bedbf","feedUrl":"http://feeds.guardian.co.uk/theguardian/culture/rss","feedTitle":"Culture | The Guardian","title":"‘We were broke, but fascinated by freedom’: exhibition showcases East German artist Gabriele Stötzer","url":"https://www.theguardian.com/artanddesign/2026/jun/29/berlin-exhibition-east-german-artist-gabriele-stotzer","publishedAt":1782712831000,"description":"<p>Show at Martin Gropius Bau gallery in Berlin is biggest ever celebration of an East German female artist in a state museum</p><p>Gabriele Stötzer remembers the days when she had to decide: “Am I buying a sausage, or film for my Super 8 camera?”</p><p>Stötzer was one of the most radical artists in communist East Germany, and her desire to create was born in defiance of and in spite of the material conditions and oppressive restrictions of the GDR regime.</p> <a href=\"https://www.theguardian.co","author":"Kate Connolly in Berlin","clusterSize":1},{"id":"6805923604c7ca3d","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"PostgreSQL 38001 e exception)</strong> occurs when a function or procedure written in an external procedural language — such as PL/Python, PL/Perl, PL/Java, or PL/R — raises an unhandled exception during execution. This error surfaces at the boundary between the external language runtime and the PostgreSQL engine. It essentially means something went wrong inside your external routine that wasn't c","author":"umzzil nng","clusterSize":5},{"id":"547f1ac230689b4c","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"Oracle ORA-01024 Error: Causes and Solutions Complete Guide","url":"https://dev.to/dbmserror/oracle-ora-01024-error-causes-and-solutions-complete-guide-4p56","publishedAt":1782691293000,"description":"<h2> ORA-01024: Invalid Datatype in OCI Call — Causes, Fixes & Prevention </h2> <p>ORA-01024 is thrown by Oracle when an OCI (Oracle Call Interface) call is made using a datatype that Oracle does not recognize or cannot process. This error typically originates at the application layer — Java, C, Python, .NET — rather than in SQL itself, making it a driver-level type mismatch issue. Because it occurs between the application and the database, you need to inspect both your application code and your","author":"umzzil nng","clusterSize":5},{"id":"0540ded0db4306a3","feedUrl":"https://dev.to/feed/tag/sql","feedTitle":"DEV Community: sql","title":"DuckDB-Iceberg v1.5.3, PostgreSQL Hash Join Tuning, & Relational Algebra to SQL","url":"https://dev.to/soytuber/duckdb-iceberg-v153-postgresql-hash-join-tuning-relational-algebra-to-sql-541g","publishedAt":1782682514000,"description":"<h2> DuckDB-Iceberg v1.5.3, PostgreSQL Hash Join Tuning, & Relational Algebra to SQL </h2> <h3> Today's Highlights </h3> <p>Today's highlights include new Iceberg features in DuckDB v1.5.3, enhancing data lake capabilities with <code>MERGE INTO</code> and <code>ALTER TABLE</code>. We also explore PostgreSQL performance tuning with the <code>enable_hashjoin</code> GUC and a unique to   const sc = document.getElementById('list-scroll');
  if (!sc) return null;
  const top = sc.getBoundingClientRect().top;
  for (const r of sc.querySelectorAll('.article-row'))
    if (r.getBoundingClientRect().bottom > top + 10) return r.dataset.id;
  return null;
}
function saveScrollAnchor(id) {
  try { localStorage.setItem('rss:anchor', id || getTopmostArticleId() || ''); } catch {}
}
function markScrolledPastRead() {
  if (_ignoreScroll) return;
  const sc = document.getElementById('list-scroll');
  if (!sc) return;
  const top = sc.getBoundingClientRect().top;
  let changed = false;
  for (const row of sc.querySelectorAll('.article-row')) {
    if (row.getBoundingClientRect().bottom >= top) break;
    const id = row.dataset.id;
    if (!isRead(id)) { setRead(id, true); row.classList.add('read'); changed = true; }
  }
  if (changed) renderSidebar();
  saveScrollAnchor();
}
function onListScroll() {
  updateAboveCount();
  if (_ignoreScroll) return;
  clearTimeout(_scrollTimer);
  _scrollTimer = setTimeout(markScrolledPastRead, 300);
}
function restoreScrollAnchor() {
  let id; try { id = localStorage.getItem('rss:anchor'); } catch {}
  if (!id) return;
  const row = document.querySelector('.article-row[data-id="' + id + '"]');
  if (!row) return;
  _ignoreScroll = true;
  row.scrollIntoView({ block: 'start' });
  setTimeout(() => { _ignoreScroll = false; }, 600);
}

function boot() {
  const d = new Date(generatedAt);
  document.getElementById('gen-badge').textContent =
    'Updated ' + d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  document.getElementById('list-scroll').addEventListener('scroll', onListScroll, { passive: true });
  renderSidebar();
  applyView();
}

function renderSidebar() {
  const now = Date.now(), todayCutoff = now - 86400000;
  let totalUnread=0, totalStarred=0, todayCount=0;
  for (const a of ALL_ARTICLES) {
    if (!isRead(a.id)) totalUnread++;
    if (isStarred(a.id)) totalStarred++;
    if ((a.publishedAt||0) >= todayCutoff) todayCount++;
  }
  document.getElementById('badge-all').textContent = ALL_ARTICLES.length;
  document.getElementById('badge-unread').textContent = totalUnread;
  document.getElementById('badge-starred').textContent = totalStarred;
  document.getElementById('badge-today').textContent = todayCount;

  const cats = {};
  for (const f of ALL_FEEDS) {
    const cat = f.category||'';
    if (!cats[cat]) cats[cat]=[];
    cats[cat].push(f);
  }
  let html = '';
  for (const [cat, feeds] of Object.entries(cats)) {
    if (cat) html += '<div class="sidebar-section">'+esc(cat)+'</div>';
    for (const f of feeds) {
      const unread = ALL_ARTICLES.filter(a=>a.feedUrl===f.url&&!isRead(a.id)).length;
      const badge = unread>0 ? '<span class="nav-badge">'+unread+'</span>' : '';
      html += '<div class="nav-item" data-feed="'+esc(f.url)+'" onclick="selectFeed(this)">'
        +'<span class="feed-dot" style="background:'+feedColor(f.url)+'"></span>'
        +'<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(f.feedTitle)+'</span>'
        +badge+'</div>';
    }
  }
  document.getElementById('feed-list').innerHTML = html;
}

function isMobile() { return window.innerWidth <= 600; }

function selectView(el) {
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  state.view = el.dataset.view;
  state.feedUrl = null;
  document.getElementById('list-title').textContent = el.dataset.label || el.dataset.view;
  state.search = ''; const si=document.getElementById('search-input'); if(si) si.value='';
  if (isMobile()) showList();
  applyView();
}
function selectFeed(el) {
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  state.view = 'feed';
  state.feedUrl = el.dataset.feed;
  const f = ALL_FEEDS.find(x=>x.url===state.feedUrl);
  document.getElementById('list-title').textContent = f?.feedTitle||'Feed';
  state.search = ''; const si2=document.getElementById('search-input'); if(si2) si2.value='';
  if (isMobile()) showList();
  applyView();
}
function setFilter(el) {
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  state.filter = el.dataset.filter;
  applyView();
}
let _st=null;
function onSearch(e) {
  state.search = e.target.value;
  clearTimeout(_st); _st = setTimeout(applyView, 250);
}

function applyView() {
  let list = [...ALL_ARTICLES];
  if (state.feedUrl) list = list.filter(a=>a.feedUrl===state.feedUrl);
  const now = Date.now(), todayCutoff = now - 86400000;
  if (state.view==='unread') list=list.filter(a=>!isRead(a.id));
  else if (state.view==='starred') list=list.filter(a=>isStarred(a.id));
  else if (state.view==='today') list=list.filter(a=>(a.publishedAt||0)>=todayCutoff);
  if (state.filter==='unread') list=list.filter(a=>!isRead(a.id));
  else if (state.filter==='starred') list=list.filter(a=>isStarred(a.id));
  if (state.search) {
    const q = state.search.toLowerCase();
    list = list.filter(a => a.title.toLowerCase().includes(q) || a.feedTitle.toLowerCase().includes(q) || (a.description||'').toLowerCase().includes(q));
  }
  list.sort((a,b)=>(b.publishedAt||0)-(a.publishedAt||0));
  state.visible = list;
  renderList();
}

const PAGE_SIZE = 50;
let listPage = 1;

function renderList() {
  listPage = 1;
  if (_observer) { _observer.disconnect(); _observer = null; }
  renderListPage(true);
}

function renderListPage(reset) {
  const scroll = document.getElementById('list-scroll');
  const empty = document.getElementById('list-empty');
  if (reset) scroll.querySelectorAll('.article-row,#scroll-sentinel').forEach(e=>e.remove());
  const batch = reset
    ? state.visible.slice(0, listPage * PAGE_SIZE)
    : state.visible.slice((listPage - 1) * PAGE_SIZE, listPage * PAGE_SIZE);
  if (reset && batch.length === 0) { empty.style.display='block'; return; }
  empty.style.display='none';
  const frag = document.createDocumentFragment();
  for (const a of batch) {
    const div = document.createElement('div');
    div.className='article-row'+(isRead(a.id)?' read':'')+(a.id===state.selected?' selected':'');
    div.dataset.id=a.id;
    div.innerHTML='<div class="row-content"><div class="row-top"><div class="unread-dot"></div><div class="row-feed">'+esc(a.feedTitle)+'</div><div class="row-date">'+relTime(a.publishedAt)+'</div></div>'
      +'<div class="row-title">'+esc(a.title)+(a.clusterSize>1?'<span class="cluster-badge">'+a.clusterSize+' sources</span>':'')+'</div>'
      +(a.description?'<div class="row-desc">'+esc(a.description)+'</div>':'')+'</div>'
      +(a.imageUrl?'<img class="row-thumb" src="'+esc(a.imageUrl)+'" alt="" loading="lazy" onerror="this.remove()">':'');
    div.onclick=()=>open(a.id);
    frag.appendChild(div);
  }
  // Remove old sentinel before appending new rows
  scroll.querySelector('#scroll-sentinel')?.remove();
  scroll.appendChild(frag);
  if (reset && !_bootRestored) { _bootRestored = true; restoreScrollAnchor(); }
  // Attach infinite-scroll sentinel if more pages remain
  if (state.visible.length > listPage * PAGE_SIZE) {
    const sentinel = document.createElement('div');
    sentinel.id = 'scroll-sentinel';
    sentinel.style.height = '1px';
    scroll.appendChild(sentinel);
    if (_observer) _observer.disconnect();
    _observer = new IntersectionObserver(([e]) => {
      if (!e.isIntersecting || _loadingMore) return;
      _loadingMore = true;
      listPage++;
      renderListPage(false);
      _loadingMore = false;
    }, { root: scroll, rootMargin: '400px' });
    _observer.observe(sentinel);
  }
}

function updateAboveCount() {
  const sc = document.getElementById('list-scroll');
  const el = document.getElementById('above-count');
  if (!sc || !el) return;
  const top = sc.getBoundingClientRect().top;
  let count = 0;
  for (const row of sc.querySelectorAll('.article-row')) {
    if (row.getBoundingClientRect().bottom < top) count++;
    else break;
  }
  el.textContent = count > 0 ? '↑ ' + count : '';
  el.classList.toggle('visible', count > 0);
}

function scrollListTop() {
  document.getElementById('list-scroll').scrollTo({ top: 0, behavior: 'smooth' });
}

function open(id) {
  document.getElementById('list-pane').classList.add('hidden');
  document.getElementById('reader-pane').classList.add('visible');
  state.selected = id;
  document.querySelectorAll('.article-row').forEach(r=>r.classList.toggle('selected',r.dataset.id===id));
  const row=document.querySelector('.article-row[data-id="'+id+'"]');
  if (row) row.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  if (!isRead(id)) {
    setRead(id,true);
    if (row) row.classList.add('read');
    renderSidebar();
  }
  saveScrollAnchor(id);
  const a = ALL_ARTICLES.find(x=>x.id===id);
  if (a) renderReader(a);
}

function renderReader(a) {
  document.getElementById('btn-star').textContent = isStarred(a.id)?'★':'☆';
  document.getElementById('btn-star').classList.toggle('on',isStarred(a.id));
  let html='<div class="reader-meta"><span class="reader-feed-badge">'+esc(a.feedTitle)+'</span><span>'+relTime(a.publishedAt)+'</span></div>';
  html+='<div id="reader-title">'+esc(a.title)+'</div>';
  if (a.ollamaSummary) html+='<div class="reader-summary-block"><div class="reader-summary-label">AI summary</div>'+esc(a.ollamaSummary)+'</div>';
  if (a.imageUrl) html+='<img id="reader-hero" src="'+esc(a.imageUrl)+'" alt="" onerror="this.remove()">';
  if (a.description) html+='<div id="reader-body"><p>'+esc(a.description)+'</p></div>';
  html+='<a id="reader-open-link" href="'+esc(a.url)+'" target="_blank" rel="noopener">Open original ↗</a>';
  document.getElementById('reader-empty').style.display='none';
  const inner=document.getElementById('reader-inner');
  inner.innerHTML=html; inner.style.display='block';
  document.getElementById('reader-scroll').scrollTop=0;
}

function nav(dir) {
  const idx=state.visible.findIndex(a=>a.id===state.selected);
  const next=state.visible[idx+dir];
  if (next) open(next.id);
}
function toggleStar() {
  const a=ALL_ARTICLES.find(x=>x.id===state.selected); if(!a) return;
  setStar(a.id,!isStarred(a.id));
  document.getElementById('btn-star').textContent=isStarred(a.id)?'★':'☆';
  document.getElementById('btn-star').classList.toggle('on',isStarred(a.id));
  renderSidebar();
}
function toggleUnread() {
  if(!state.selected) return;
  const wasRead=isRead(state.selected);
  setRead(state.selected,!wasRead);
  const row=document.querySelector('.article-row[data-id="'+state.selected+'"]');
  if(row) row.classList.toggle('read',!wasRead);
  renderSidebar();
}
function markAllRead() {
  for (const a of state.visible) setRead(a.id,true);
  document.querySelectorAll('.article-row').forEach(r=>r.classList.add('read'));
  renderSidebar();
}
function showList() {
  document.getElementById('list-pane').classList.remove('hidden');
  document.getElementById('reader-pane').classList.remove('visible');
}

document.addEventListener('keydown', e=>{
  if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if(e.key==='j') nav(1);
  else if(e.key==='k') nav(-1);
  else if(e.key==='u') toggleUnread();
  else if(e.key==='s') toggleStar();
  else if(e.key==='Escape') { if(isMobile()) showList(); }
  else if(e.key==='/') { e.preventDefault(); const si=document.getElementById('search-input'); if(si){si.focus();si.select();} }
  else if(e.key==='o'&&state.selected) {
    const a=ALL_ARTICLES.find(x=>x.id===state.selected);
    if(a) window.open(a.url,'_blank','noopener');
  }
});

boot();
</script>
</body>
</html>
